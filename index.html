                    <span style={{fontFamily:'monospace',fontWeight:700,color:'var(--brand-yellow-dark)',fontSize:10,minWidth:44}}>{r.item.i}</span>
                    <span style={{flex:1}}>{r.item.t}</span>
                    <span style={{fontSize:9,color:'var(--text-muted)'}}>{r.fw}</span>

          </div>

          <div className="fade-in">

            {SERVICE_FWS.includes(activeFw)?(
              <>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12}}>
                  {(fwStats.byCategory||[]).map(cat=>{
                    const pct=Math.round(cat.pct||0);

                      <div key={cat.key} className="card" style={{padding:16,textAlign:'center'}}>

                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{(cat.ach||0).toFixed(1)}/{(cat.total||0).toFixed(1)} contribution</div>

        const [reviewComment,setReviewComment]=React.useState("");
        return(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
            <div className="card" style={{maxWidth:520,width:'100%',padding:22,maxHeight:'calc(100vh - 56px)',overflow:'auto'}} onClick={e=>e.stopPropagation()}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>Evidence Management</div>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{id} — {evid}</div>
                </div>
                <button type="button" onClick={()=>setShowEvidenceModal(null)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)'}}>{IC.x}</button>
              </div>

              {/* Current Status */}
              <div style={{background:'var(--bg-accent)',borderRadius:8,padding:12,marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                  <span className="label">Current Status</span>
                  <span style={{...badge(ESC[ef?.status||"Missing"]),fontSize:11}}>{ef?.status||"Missing"}</span>
                </div>
                {ef&&(
                  <div style={{fontSize:10,color:'var(--text-secondary)',lineHeight:1.6}}>
                    <div>File: <strong>{ef.name}</strong></div>
                    <div>Submitted: {fmtDate(ef.submittedAt)} by {ef.submittedBy}</div>
                    {ef.reviewedAt&&<div>Reviewed: {fmtDate(ef.reviewedAt)} by {ef.reviewedBy}</div>}
                    {ef.comment&&<div style={{marginTop:4,fontStyle:'italic'}}>Comment: {ef.comment}</div>}
                  </div>
                )}
              </div>

              {/* Status Flow visualization */}
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,gap:4}}>
                {EVIDENCE_STATUSES.map((s,i)=>{
                  const cur=ef?.status||"Missing";
                  const idx2=EVIDENCE_STATUSES.indexOf(cur);
                  const isActive=s===cur;
                  const isPast=i<idx2;
                  return(
                    <div key={s} style={{flex:1,textAlign:'center'}}>
                      <div style={{width:28,height:28,borderRadius:'50%',background:isActive?ESC[s]:isPast?ESC[s]+'40':'var(--border)',margin:'0 auto 4px',display:'flex',alignItems:'center',justifyContent:'center',border:`2px solid ${isActive?ESC[s]:isPast?ESC[s]+'60':'var(--border)'}`,fontSize:9,fontWeight:700,color:isActive?'#fff':isPast?ESC[s]:'var(--text-muted)'}}>
                        {isPast?'✓':i+1}
                      </div>
                      <div style={{fontSize:8,color:isActive?ESC[s]:'var(--text-muted)',fontWeight:isActive?700:400,lineHeight:1.2}}>{s}</div>
                    </div>
                  );
                })}
              </div>

              {/* Upload simulation (static preview) */}
              {(!ef||ef.status==="Rejected"||ef.status==="Expired")&&(
                <div style={{marginBottom:12}}>
                  <span className="label">Submit Evidence (Static Preview — enter filename)</span>
                  <div style={{display:'flex',gap:6}}>
                    <input style={inp} placeholder="e.g., Policy_v2.pdf" value={localFile} onChange={e=>setLocalFile(e.target.value)}/>
                    <button type="button" disabled={!localFile||!perms.canUploadEvidence} onClick={()=>{submitEvidence(fw,id,idx,localFile);setShowEvidenceModal(null);}}
                      style={{background:perms.canUploadEvidence&&localFile?'var(--brand-yellow)':'var(--border)',color:perms.canUploadEvidence&&localFile?'var(--brand-charcoal)':'var(--text-muted)',border:'none',borderRadius:6,padding:'5px 12px',fontSize:10,fontWeight:700,cursor:perms.canUploadEvidence&&localFile?'pointer':'not-allowed',whiteSpace:'nowrap'}}>
                      {IC.upload} Submit
                    </button>
                  </div>
                  {!perms.canUploadEvidence&&<div style={{fontSize:9,color:'#ef4444',marginTop:3}}>Your role ({role}) cannot upload evidence.</div>}
                  <div style={{fontSize:9,color:'var(--text-muted)',marginTop:3}}>Static preview: Max 50MB, all file types. SHA-256 hash + timestamp stored in SaaS phase.</div>
                </div>
              )}

              {/* Review actions for Compliance Manager/Admin */}
              {ef&&ef.status==="Submitted"&&perms.canApproveControls&&(
                <div style={{marginBottom:12}}>
                  <span className="label">Reviewer Decision</span>
                  <textarea style={{...inp,minHeight:50,resize:'vertical',marginBottom:6}} placeholder="Optional review comment..." value={reviewComment} onChange={e=>setReviewComment(e.target.value)}/>
                  <div style={{display:'flex',gap:6}}>
                    <button type="button" onClick={()=>{reviewEvidence(fw,id,idx,"Accepted",reviewComment);setShowEvidenceModal(null);}} style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✓ Accept</button>
                    <button type="button" onClick={()=>{reviewEvidence(fw,id,idx,"Rejected",reviewComment);setShowEvidenceModal(null);}} style={{flex:1,background:'#ef4444',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✗ Reject</button>
                  </div>
                </div>
              )}

              {ef&&ef.status==="Under Review"&&perms.canApproveControls&&(
                <div style={{display:'flex',gap:6,marginBottom:12}}>
                  <button type="button" onClick={()=>{reviewEvidence(fw,id,idx,"Accepted","Approved after review");setShowEvidenceModal(null);}} style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✓ Mark Accepted</button>
                  <button type="button" onClick={()=>{reviewEvidence(fw,id,idx,"Rejected","Not acceptable");setShowEvidenceModal(null);}} style={{flex:1,background:'#ef4444',color:'#fff',border:'none',borderRadius:6,padding:'6px 10px',fontSize:10,fontWeight:700,cursor:'pointer'}}>✗ Mark Rejected</button>
                </div>
              )}

              <button type="button" onClick={()=>setShowEvidenceModal(null)} style={{width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:6,padding:'7px 12px',fontSize:11,cursor:'pointer',color:'var(--text-secondary)'}}>Close</button>
            </div>
          </div>
        );
      })()}

      {/* ── ADD POLICY MODAL ───────────────────────────────────────────────── */}
            {showPolicyModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',backdropFilter:'blur(2px)',zIndex:9999,display:'flex',alignItems:'flex-start',justifyContent:'center',padding:'28px 16px'}} onClick={e=>e.stopPropagation()}>
          <div className="card" style={{maxWidth:680,width:'100%',padding:22,maxHeight:'calc(100vh - 56px)',overflow:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:900,fontSize:14}}>Import or Add Policy</div>
              <button type="button" onClick={()=>setShowPolicyModal(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:18,lineHeight:1}}>{IC.x}</button>
            </div>

            <div style={{marginBottom:12,padding:'10px 12px',borderRadius:10,background:'var(--bg-accent)',border:'1px solid var(--border-accent)'}}>
              <div style={{fontSize:11,fontWeight:900,color:'var(--brand-charcoal)'}}>Demo environment</div>
              <div style={{fontSize:10,color:'var(--text-secondary)',marginTop:2}}>Import/upload actions are disabled. This screen is a UI placeholder only.</div>
            </div>

            <div style={{pointerEvents:'none',opacity:.85}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div className="card" style={{padding:14}}>
                  <div style={{fontWeight:900,fontSize:12,marginBottom:6}}>Import Policy Pack</div>
                  <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:10}}>Import a ZIP/XLSX pack of policies and map to controls.</div>
                  <div style={{border:'1px dashed var(--border)',borderRadius:12,padding:14,textAlign:'center',color:'var(--text-muted)',fontSize:11}}>
                    Drag & Drop disabled (demo)
                  </div>
                  <button type="button" disabled style={{marginTop:10,width:'100%',background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',fontSize:11,fontWeight:900}}>Browse files</button>
                </div>

                <div className="card" style={{padding:14}}>
                  <div style={{fontWeight:900,fontSize:12,marginBottom:6}}>Add Policy Manually</div>
                  <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:10}}>Create a policy record and track lifecycle (Draft → Published).</div>
                  <div style={{display:'grid',gap:8}}>
                    <input style={inp} placeholder="Title (disabled)" disabled />
                    <input style={inp} placeholder="Owner (disabled)" disabled />
                    <select style={sel} disabled><option>Policy</option></select>
                  </div>
                  <button type="button" disabled style={{marginTop:10,width:'100%',background:'var(--brand-yellow)',border:'none',borderRadius:10,padding:'8px 12px',fontSize:11,fontWeight:900,color:'var(--brand-charcoal)'}}>Create policy</button>
                </div>
              </div>

              <div className="card" style={{padding:14,marginTop:12}}>
                <div style={{fontWeight:900,fontSize:12,marginBottom:6}}>What this would do in production</div>
                <ul style={{margin:'0 0 0 18px',fontSize:11,color:'var(--text-secondary)',lineHeight:1.6}}>
                  <li>Upload or import policy files.</li>
                  <li>Tag policies to services/controls.</li>
                  <li>Track review dates and approvals.</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      )}


    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
