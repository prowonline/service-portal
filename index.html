(function(){
  function show(msg){
    try{
      var el=document.getElementById('root');
      if(el){ el.innerHTML = '<div style="max-width:900px;margin:24px auto;padding:16px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;">'
        + '<div style="font-weight:800;margin-bottom:8px;">Portal failed to load</div>'
        + '<div style="white-space:pre-wrap;font-family:'Aptos';font-size:14px;color:#111827;">'
        + msg + '</div>'
        + '<div style="margin-top:10px;font-size:14px;color:#6b7280;">Tip: open Developer Tools → Console to see full error details.</div>'
        + '</div>';
      }
    }catch(e){}
  }
  window.addEventListener('error', function(e){
    var msg = (e && (e.message || e.error && e.error.message)) ? (e.message || e.error.message) : 'Unknown error';
    show(msg);
  });
  window.addEventListener('unhandledrejection', function(e){
    var msg = (e && e.reason && (e.reason.message||String(e.reason))) ? (e.reason.message||String(e.reason)) : 'Unhandled promise rejection';
    show(msg);
  });
})();
</script>

const DB_NAME="prow-portal-db";
const DB_STORE_FILES="files";
function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(DB_STORE_FILES))db.createObjectStore(DB_STORE_FILES);};
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function idbDelPrefix(prefix){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE_FILES,"readwrite");
    const store=tx.objectStore(DB_STORE_FILES);
    const req=store.openCursor();
    req.onsuccess=(e)=>{
      const cur=e.target.result;
      if(cur){if(String(cur.key||"").startsWith(prefix)) cur.delete();cur.continue();}
    };
    tx.oncomplete=()=>{db.close();resolve(true);};
    tx.onerror=()=>{db.close();reject(tx.error);};
  });
}

async function sha256Base64(text){
  // Prefer WebCrypto when available (secure contexts). Fallback to a fast non-crypto hash for demo mode / file://.
  try{
    if(typeof crypto!=="undefined" && crypto.subtle && crypto.subtle.digest){
      const enc=new TextEncoder().encode(text);
      const buf=await crypto.subtle.digest("SHA-256",enc);
      const bytes=new Uint8Array(buf);
      let bin="";bytes.forEach(b=>bin+=String.fromCharCode(b));
      return btoa(bin);
    }
  }catch(e){}
  // Fallback: FNV-1a 32-bit (NOT cryptographically secure; demo only)
  let h=2166136261;
  const s=String(text||"");
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}
  return "fnv1a:"+String(h>>>0);
}

cracking.","p":"High","e":"GPO report export (HTML) showing Minimum password length.\nIf FGPP: export of FGPP objects (Get-ADFineGrainedPasswordPolicy) and group assignments.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Normal users: >= 12 characters (minimum).\nService accounts: >= 14 characters (preferred).\nAdmin accounts / Tier-0: >= 16 characters (preferred).","where":"Default Domain Policy (Domain-wide). For differentiated requirements use Fine-Grained Password Policies (FGPP).","risk":"If weak, password spraying and brute-force become more viable; compromised creds accelerate lateral movement and privilege escalation.","assessment":"Confirm current setting in Default Domain Policy and any FGPP precedence.\nIdentify accounts requiring stronger policies (admins, service accounts) and verify they are scoped to the right FGPP groups.","config":"Open Group Policy Management (gpmc.msc) -> Default Domain Policy.\nGo to: Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Minimum password length.\nIf using FGPP: use ADAC or PowerShell New-ADFineGrainedPasswordPolicy and assign to groups (e.g., Tier0-Admins, ServiceAccounts).","validation":"Attempt login policy validation in lab or via policy report; confirm applied policy via gpresult /h on a test machine.","inspiredBy":"NIST SP 800-63B (password guidance).; CIS Benchmarks (Windows Server / AD).; ISO 27001 (secure authentication, access control).; SOC 2 (logical access controls)."},"s":["Assess: Confirm current setting in Default Domain Policy and any FGPP precedence.","Implement: Open Group Policy Management (gpmc.msc) -> Default Domain Policy.","Evidence: GPO report export (HTML) showing Minimum password length.","Validate: Attempt login policy validation in lab or via policy report; confirm applied policy via gpresult /h on a test machine."],"q":["Baseline/Target: Normal users: >= 12 characters (minimum).\nService accounts: >= 14 characters (preferred).\nAdmin accounts / Tier-0: >= 16 characters (preferred).","Where: Default Domain Policy (Domain-wide). For differentiated requirements use Fine-Grained Password Policies (FGPP).","Evidence: GPO report export (HTML) showing Minimum password length.\nIf FGPP: export of FGPP objects (Get-ADFineGrainedPasswordPolicy) and group assignments."]},{"i":"ADGPO-ASMT-A-02","t":"Password complexity / banned patterns","d":"Requires passwords to meet complexity rules (or equivalent banned-password controls) to reduce predictable password choices.","p":"High","e":"GPO report showing complexity enabled.\nIf banned-passwords: deployment evidence and policy settings.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Enable complexity requirement (baseline).\nPrefer banned-password/dictionary controls where available (e.g., Entra Password Protection).","where":"Default Domain Policy (or FGPP if used).","risk":"Without complexity or banned-password controls, users choose guessable passwords, increasing success of credential stuffing/spraying.","assessment":"Review whether complexity is enabled and whether a banned-password control exists.\nCheck exception scopes (service accounts often need long random passphrases, not predictable patterns).","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Password must meet complexity requirements = Enabled.\nIf available: deploy Entra ID Password Protection for on-prem banned password lists (separate project).","validation":"Validate applied setting via gpresult /h and attempt password change test in controlled manner.","inspiredBy":"CIS Benchmarks (Windows).; NIST SP 800-63B.; ISO 27001 secure authentication.; SOC 2 CC6.* access controls."},"s":["Assess: Review whether complexity is enabled and whether a banned-password control exists.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.","Evidence: GPO report showing complexity enabled.","Validate: Validate applied setting via gpresult /h and attempt password change test in controlled manner."],"q":["Baseline/Target: Enable complexity requirement (baseline).\nPrefer banned-password/dictionary controls where available (e.g., Entra Password Protection).","Where: Default Domain Policy (or FGPP if used).","Evidence: GPO report showing complexity enabled.\nIf banned-passwords: deployment evidence and policy settings."]},{"i":"ADGPO-ASMT-A-03","t":"Password history","d":"Prevents rapid reuse of old passwords after forced changes or compromise response.","p":"Medium","e":"GPO report export showing Enforce password history.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Enforce password history >= 24.","where":"Default Domain Policy (or FGPP).","risk":"If history is low, users can cycle passwords and quickly return to a known compromised password.","assessment":"Check current Enforce password history value and whether FGPP overrides it.","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Enforce password history = 24 (or higher where policy requires).","validation":"Test password reset behavior with controlled account; verify setting in resultant set of policy.","inspiredBy":"CIS Benchmarks (Windows).; ISO 27001 secure authentication."},"s":["Assess: Check current Enforce password history value and whether FGPP overrides it.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.","Evidence: GPO report export showing Enforce password history.","Validate: Test password reset behavior with controlled account; verify setting in resultant set of policy."],"q":["Baseline/Target: Enforce password history >= 24.","Where: Default Domain Policy (or FGPP).","Evidence: GPO report export showing Enforce password history."]},{"i":"ADGPO-ASMT-A-04","t":"Maximum password age","d":"Limits lifetime of credentials to reduce window of exposure when passwords leak.","p":"Medium","e":"GPO report export showing Maximum password age; evidence of service account rotation method if exempted.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Maximum password age <= 90 days (context-dependent).\nPrefer risk-based approach: admins/service accounts may use long random passwords with controlled rotation.","where":"Default Domain Policy (or FGPP).","risk":"If too long, leaked passwords remain valid for extended periods; if too short without automation, leads to weak password behaviors.","assessment":"Review current maximum age; confirm service/admin accounts handled via FGPP or PAM rotation.\nVerify no operational breakage (legacy apps).","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Maximum password age = 90 days (or per customer policy).\nIf service accounts: implement controlled rotation via PAM/secrets management instead of forcing interactive changes.","validation":"Confirm resultant set of policy and rotation schedule alignment.","inspiredBy":"ISO 27001 secure authentication.; SOC 2 access controls.; CIS Benchmarks."},"s":["Assess: Review current maximum age; confirm service/admin accounts handled via FGPP or PAM rotation.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.","Evidence: GPO report export showing Maximum password age; evidence of service account rotation method if exempted.","Validate: Confirm resultant set of policy and rotation schedule alignment."],"q":["Baseline/Target: Maximum password age <= 90 days (context-dependent).\nPrefer risk-based approach: admins/service accounts may use long random passwords with controlled rotation.","Where: Default Domain Policy (or FGPP).","Evidence: GPO report export showing Maximum password age; evidence of service account rotation method if exempted."]},{"i":"ADGPO-ASMT-A-05","t":"Minimum password age","d":"Prevents immediate cycling through password history to reuse an old password.","p":"Low","e":"GPO report showing Minimum password age.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":1,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Minimum password age >= 1 day (baseline).","where":"Default Domain Policy (or FGPP).","risk":"If not set, users can change passwords repeatedly to bypass history controls and return to a preferred password.","assessment":"Check current minimum age and whether it is non-zero.","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Minimum password age = 1 day.","validation":"Verify by attempting successive password changes on a test account.","inspiredBy":"CIS Benchmarks (Windows)."},"s":["Assess: Check current minimum age and whether it is non-zero.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.","Evidence: GPO report showing Minimum password age.","Validate: Verify by attempting successive password changes on a test account."],"q":["Baseline/Target: Minimum password age >= 1 day (baseline).","Where: Default Domain Policy (or FGPP).","Evidence: GPO report showing Minimum password age."]},{"i":"ADGPO-ASMT-A-06","t":"Reversible encryption disabled","d":"Ensures passwords are not stored in a form that can be recovered in plaintext.","p":"High","e":"GPO report showing reversible encryption disabled.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Store passwords using reversible encryption = Disabled.","where":"Default Domain Policy.","risk":"If enabled, attackers gaining directory access can recover passwords, leading to broad compromise.","assessment":"Confirm setting and verify no apps depend on reversible encryption.","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.\nSet: Store passwords using reversible encryption = Disabled.","validation":"Validate via resultant policy and confirm no accounts flagged for reversible encryption requirement.","inspiredBy":"CIS Benchmarks (Windows).; ISO 27001 cryptographic controls."},"s":["Assess: Confirm setting and verify no apps depend on reversible encryption.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Password Policy.","Evidence: GPO report showing reversible encryption disabled.","Validate: Validate via resultant policy and confirm no accounts flagged for reversible encryption requirement."],"q":["Baseline/Target: Store passwords using reversible encryption = Disabled.","Where: Default Domain Policy.","Evidence: GPO report showing reversible encryption disabled."]},{"i":"ADGPO-ASMT-A-07","t":"Account lockout threshold","d":"Throttles repeated logon attempts to reduce online password guessing/spraying impact.","p":"High","e":"GPO report showing threshold value.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Lockout threshold: 10 (typical baseline) or per customer policy.\nLockout reset and duration aligned (see A-08/A-09).","where":"Default Domain Policy.","risk":"If not configured, attackers can attempt unlimited guesses; if too strict, can cause self-inflicted DoS and account lockouts.","assessment":"Check current lockout threshold and review false-positive risk (service accounts).","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.\nSet: Account lockout threshold.","validation":"Validate with controlled test and ensure monitoring for lockout spikes.","inspiredBy":"CIS Benchmarks (Windows).; NIST 800-63B (rate limiting concepts)."},"s":["Assess: Check current lockout threshold and review false-positive risk (service accounts).","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.","Evidence: GPO report showing threshold value.","Validate: Validate with controlled test and ensure monitoring for lockout spikes."],"q":["Baseline/Target: Lockout threshold: 10 (typical baseline) or per customer policy.\nLockout reset and duration aligned (see A-08/A-09).","Where: Default Domain Policy.","Evidence: GPO report showing threshold value."]},{"i":"ADGPO-ASMT-A-08","t":"Account lockout duration","d":"Defines how long an account remains locked after exceeding the threshold.","p":"Medium","e":"GPO report showing lockout duration.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":2,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Lockout duration: 15 minutes (typical) or per customer policy.","where":"Default Domain Policy.","risk":"If too short, attackers can keep retrying; if too long, operational impact increases during attacks or user errors.","assessment":"Review duration and alignment with incident response process.","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.\nSet: Account lockout duration.","validation":"Validate with controlled lockout test (non-production account).","inspiredBy":"CIS Benchmarks (Windows)."},"s":["Assess: Review duration and alignment with incident response process.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.","Evidence: GPO report showing lockout duration.","Validate: Validate with controlled lockout test (non-production account)."],"q":["Baseline/Target: Lockout duration: 15 minutes (typical) or per customer policy.","Where: Default Domain Policy.","Evidence: GPO report showing lockout duration."]},{"i":"ADGPO-ASMT-A-09","t":"Account lockout reset counter","d":"Defines how long before failed attempt count resets, supporting rate limiting.","p":"Low","e":"GPO report showing reset counter.","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":1,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Reset account lockout counter after: 15 minutes (typical) aligned with duration.","where":"Default Domain Policy.","risk":"If not aligned, lockout protection becomes ineffective or overly disruptive.","assessment":"Confirm reset counter aligns with threshold and duration.","config":"GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.\nSet: Reset account lockout counter after.","validation":"Validate by observing attempt counter reset timing.","inspiredBy":"CIS Benchmarks (Windows)."},"s":["Assess: Confirm reset counter aligns with threshold and duration.","Implement: GPMC -> Default Domain Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Account Policies -> Account Lockout Policy.","Evidence: GPO report showing reset counter.","Validate: Validate by observing attempt counter reset timing."],"q":["Baseline/Target: Reset account lockout counter after: 15 minutes (typical) aligned with duration.","Where: Default Domain Policy.","Evidence: GPO report showing reset counter."]},{"i":"ADGPO-ASMT-A-10","t":"Kerberos encryption types (AES)","d":"Ensures Kerberos uses strong cryptography (AES) and avoids legacy encryption where feasible.","p":"High","e":"GPO report for DC policy setting.\nInventory report of accounts requiring legacy encryption (exception list).","sec":"Category A","meta":{"category":"A","categoryName":"Category A","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Enable AES 128/256; minimize/disable DES; plan to reduce RC4 where compatible.","where":"Primarily Default Domain Controllers Policy (for DC settings) plus account-level encryption flags review.","risk":"Legacy Kerberos encryption increases risk of ticket cracking and downgrade opportunities, supporting credential theft and lateral movement.","assessment":"Check DC policy for allowed Kerberos encryption types.\nIdentify accounts still using legacy crypto (DES/RC4) and document compatibility dependencies.","config":"GPMC -> Default Domain Controllers Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nConfigure: Network security: Configure encryption types allowed for Kerberos (select AES types; avoid DES).\nReview user/computer account settings in AD (support for AES) and update as appropriate.","validation":"Validate authentication success for key systems; monitor Kerberos errors during rollout.","inspiredBy":"CIS Benchmarks (Windows/AD).; Microsoft security guidance for Kerberos.; ISO 27001 cryptography & access controls.\nSection B – Privileged Account Protection"},"s":["Assess: Check DC policy for allowed Kerberos encryption types.","Implement: GPMC -> Default Domain Controllers Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report for DC policy setting.","Validate: Validate authentication success for key systems; monitor Kerberos errors during rollout."],"q":["Baseline/Target: Enable AES 128/256; minimize/disable DES; plan to reduce RC4 where compatible.","Where: Primarily Default Domain Controllers Policy (for DC settings) plus account-level encryption flags review.","Evidence: GPO report for DC policy setting.\nInventory report of accounts requiring legacy encryption (exception list)."]},{"i":"ADGPO-ASMT-B-01","t":"Domain Admins membership review","d":"Ensures Domain Admins membership is minimal, justified, and continuously governed.","p":"High","e":"Export of group membership and approvals; exception register entries if any.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Only required break-glass + tightly controlled admin accounts.\nNo service accounts; no nesting from broad groups.","where":"Active Directory (group membership governance).","risk":"Overprivileged Domain Admins enables immediate full-domain compromise if any one account is phished or infected.","assessment":"Export Domain Admins membership and nested groups.\nConfirm each member has business justification, owner, and last review date.","config":"Use ADUC or PowerShell: Get-ADGroupMember \"Domain Admins\" -Recursive.\nRemove non-essential accounts; create time-bound elevation process (PAM/JIT) if available.","validation":"Re-run membership export after changes; verify no unexpected nesting.","inspiredBy":"CIS Controls v8 (privileged access).; NIST 800-53 AC-6, AC-2.; ISO 27001 privileged access rights.; SOC 2 CC6.2/CC6.3."},"s":["Assess: Export Domain Admins membership and nested groups.","Implement: Use ADUC or PowerShell: Get-ADGroupMember \"Domain Admins\" -Recursive.","Evidence: Export of group membership and approvals; exception register entries if any.","Validate: Re-run membership export after changes; verify no unexpected nesting."],"q":["Baseline/Target: Only required break-glass + tightly controlled admin accounts.\nNo service accounts; no nesting from broad groups.","Where: Active Directory (group membership governance).","Evidence: Export of group membership and approvals; exception register entries if any."]},{"i":"ADGPO-ASMT-B-02","t":"Enterprise Admins membership review","d":"Controls forest-wide power; prevents a single account from owning every domain.","p":"High","e":"Membership export + approval records.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Enterprise Admins empty or near-empty; used only for forest-level tasks.","where":"Active Directory (forest root domain).","risk":"Compromise leads to forest-wide takeover, cross-domain persistence, and trust abuse.","assessment":"Export Enterprise Admins membership and nested groups; validate each.","config":"PowerShell: Get-ADGroupMember \"Enterprise Admins\" -Recursive.\nRemove accounts unless strictly necessary; require separate forest admin accounts.","validation":"Re-check and set monitoring alerts for group membership changes.","inspiredBy":"CIS Controls v8.; NIST 800-53 AC-6.; ISO 27001 privileged access."},"s":["Assess: Export Enterprise Admins membership and nested groups; validate each.","Implement: PowerShell: Get-ADGroupMember \"Enterprise Admins\" -Recursive.","Evidence: Membership export + approval records.","Validate: Re-check and set monitoring alerts for group membership changes."],"q":["Baseline/Target: Enterprise Admins empty or near-empty; used only for forest-level tasks.","Where: Active Directory (forest root domain).","Evidence: Membership export + approval records."]},{"i":"ADGPO-ASMT-B-03","t":"Built-in Administrator account renamed/disabled (governed break-glass)","d":"Reduces predictable targeting of the well-known RID-500 account and enforces break-glass governance.","p":"High","e":"Screenshot/export of account properties (name, enabled/disabled) with sensitive data redacted; break-glass SOP reference.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Rename RID-500 account; set strong unique password; disable for normal operations if feasible.\nMaintain a documented break-glass process with vaulting.","where":"Active Directory + GPO for local accounts (where applicable).","risk":"If left default, attackers target predictable admin accounts; if unmanaged break-glass exists, it becomes an unmonitored backdoor.","assessment":"Identify RID-500 account state and last usage.\nConfirm break-glass controls (vault, logging, restricted use).","config":"In ADUC: rename built-in Administrator (domain) and ensure it is not used for daily admin tasks.\nSet: Account is disabled (if feasible) and create separate emergency admin accounts.\nDocument break-glass: access approval, offline storage, periodic test.","validation":"Monitor security logs for RID-500 usage; verify rename in SID history remains unchanged.","inspiredBy":"CIS Benchmarks (Windows/AD).; NIST 800-53 IA-2/AC-6.; ISO 27001 privileged access."},"s":["Assess: Identify RID-500 account state and last usage.","Implement: In ADUC: rename built-in Administrator (domain) and ensure it is not used for daily admin tasks.","Evidence: Screenshot/export of account properties (name, enabled/disabled) with sensitive data redacted; break-glass SOP reference.","Validate: Monitor security logs for RID-500 usage; verify rename in SID history remains unchanged."],"q":["Baseline/Target: Rename RID-500 account; set strong unique password; disable for normal operations if feasible.\nMaintain a documented break-glass process with vaulting.","Where: Active Directory + GPO for local accounts (where applicable).","Evidence: Screenshot/export of account properties (name, enabled/disabled) with sensitive data redacted; break-glass SOP reference."]},{"i":"ADGPO-ASMT-B-04","t":"Separate admin accounts (no dual-use)","d":"Prevents daily-use accounts from being used for privileged tasks, limiting exposure to phishing and malware.","p":"High","e":"Account inventory showing separation; group policy evidence of logon restrictions.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Each admin has: standard user account + separate privileged admin account(s).\nAdmin accounts restricted to admin workstations/jump hosts.","where":"Identity governance policy + AD group design.","risk":"If admins use the same account everywhere, one phish/malware event yields domain compromise.","assessment":"Validate admins have separate accounts and that privileged accounts are not mailbox-enabled where possible.\nCheck logon restrictions and group memberships.","config":"Create admin account naming standard (e.g., username-admin).\nApply logon restrictions via GPO: user rights assignment and deny logon locally/through RDP where appropriate.\nImplement PAW/jump host requirement if contracted.","validation":"Verify via event logs: admin accounts only used on approved hosts.","inspiredBy":"Microsoft privileged access guidance (tiering).; CIS Controls v8.; ISO 27001 privileged access."},"s":["Assess: Validate admins have separate accounts and that privileged accounts are not mailbox-enabled where possible.","Implement: Create admin account naming standard (e.g., username-admin).","Evidence: Account inventory showing separation; group policy evidence of logon restrictions.","Validate: Verify via event logs: admin accounts only used on approved hosts."],"q":["Baseline/Target: Each admin has: standard user account + separate privileged admin account(s).\nAdmin accounts restricted to admin workstations/jump hosts.","Where: Identity governance policy + AD group design.","Evidence: Account inventory showing separation; group policy evidence of logon restrictions."]},{"i":"ADGPO-ASMT-B-05","t":"No shared admin accounts","d":"Ensures accountability and non-repudiation for privileged actions.","p":"High","e":"Account list and decommission record; vault evidence for break-glass.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Privileged accounts are unique per person; shared accounts eliminated or strictly break-glass only.","where":"Identity governance.","risk":"Shared admin accounts remove traceability, enable insider abuse, and complicate incident response.","assessment":"Identify shared/admin generic accounts; confirm ownership and usage.","config":"Replace shared accounts with named accounts; use privileged elevation (PAM/JIT) for temporary needs.\nIf a shared break-glass remains, store in vault with approvals and full session logging where possible.","validation":"Confirm shared accounts removed from privileged groups; monitor for re-creation.","inspiredBy":"SOC 2 accountability/logical access.; ISO 27001 access control.; NIST AU/AC controls."},"s":["Assess: Identify shared/admin generic accounts; confirm ownership and usage.","Implement: Replace shared accounts with named accounts; use privileged elevation (PAM/JIT) for temporary needs.","Evidence: Account list and decommission record; vault evidence for break-glass.","Validate: Confirm shared accounts removed from privileged groups; monitor for re-creation."],"q":["Baseline/Target: Privileged accounts are unique per person; shared accounts eliminated or strictly break-glass only.","Where: Identity governance.","Evidence: Account list and decommission record; vault evidence for break-glass."]},{"i":"ADGPO-ASMT-B-06","t":"Admin accounts not used for daily activities","d":"Reduces attack surface by limiting privileged account exposure to email, web browsing, and user endpoints.","p":"High","e":"Event log evidence of admin logons restricted to approved hosts.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Privileged accounts: no email, no browsing, no Office sign-in on user endpoints.","where":"Operational policy + technical enforcement (where possible).","risk":"Daily-use exposure increases likelihood of credential theft and privileged compromise.","assessment":"Review admin account usage patterns (logons, workstation types).","config":"Enforce via policy and where possible via GPO logon restrictions and PAW/jump host design.\nBlock interactive logon to user workstations for admin accounts; allow only on admin hosts.","validation":"Spot-check last 30 days admin logons; validate restrictions apply.","inspiredBy":"Microsoft PAW/tiering guidance.; CIS Controls v8."},"s":["Assess: Review admin account usage patterns (logons, workstation types).","Implement: Enforce via policy and where possible via GPO logon restrictions and PAW/jump host design.","Evidence: Event log evidence of admin logons restricted to approved hosts.","Validate: Spot-check last 30 days admin logons; validate restrictions apply."],"q":["Baseline/Target: Privileged accounts: no email, no browsing, no Office sign-in on user endpoints.","Where: Operational policy + technical enforcement (where possible).","Evidence: Event log evidence of admin logons restricted to approved hosts."]},{"i":"ADGPO-ASMT-B-07","t":"Service accounts not in Domain Admins","d":"Prevents non-human identities from holding full domain privileges; service accounts are frequently targeted and hard to monitor.","p":"High","e":"Service account inventory + membership export + change records.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"No service accounts in Domain/Enterprise Admins; use least privilege and gMSA where possible.","where":"Active Directory group memberships and service identity design.","risk":"Compromised service accounts become persistent privileged footholds; often have long-lived passwords.","assessment":"Inventory service accounts; check privileged group membership and rights assignments.","config":"Remove service accounts from privileged groups.\nMigrate to gMSA for supported services; assign required rights explicitly (principle of least privilege).","validation":"Validate service functionality post-change; monitor for privilege escalation attempts.","inspiredBy":"Microsoft gMSA guidance.; CIS Controls v8.; NIST AC-6."},"s":["Assess: Inventory service accounts; check privileged group membership and rights assignments.","Implement: Remove service accounts from privileged groups.","Evidence: Service account inventory + membership export + change records.","Validate: Validate service functionality post-change; monitor for privilege escalation attempts."],"q":["Baseline/Target: No service accounts in Domain/Enterprise Admins; use least privilege and gMSA where possible.","Where: Active Directory group memberships and service identity design.","Evidence: Service account inventory + membership export + change records."]},{"i":"ADGPO-ASMT-B-08","t":"Privileged accounts require MFA (or equivalent strong auth)","d":"Adds strong authentication for privileged access paths (RDP, VPN, admin portals, PAM).","p":"High","e":"Evidence of policy (Conditional Access / PAM config) and coverage list of privileged accounts.","sec":"Category B","meta":{"category":"B","categoryName":"Category B","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"MFA enforced for privileged access (Conditional Access / PAM / VPN/RDP MFA).\nWhere MFA not possible: smartcard/cert logon for Tier-0 admins.","where":"Depends on stack: Entra ID / VPN / PAM / NPS extension; not purely GPO.","risk":"Without MFA, a single stolen password can lead directly to Tier-0 compromise.","assessment":"Confirm MFA coverage for all privileged entry points and admin accounts.\nIdentify bypasses (legacy auth, service protocols).","config":"Implement MFA using the customer’s identity platform (preferred: Entra Conditional Access or PAM).\nFor RDP on-prem: use MFA-enabled gateway/jump host; avoid direct DC RDP.","validation":"Test privileged login with MFA; validate exemptions list is approved and monitored.","inspiredBy":"NIST 800-63B (MFA).; ISO 27001 secure authentication.; SOC 2 CC6.*.\nSection C – User Account Hygiene"},"s":["Assess: Confirm MFA coverage for all privileged entry points and admin accounts.","Implement: Implement MFA using the customer’s identity platform (preferred: Entra Conditional Access or PAM).","Evidence: Evidence of policy (Conditional Access / PAM config) and coverage list of privileged accounts.","Validate: Test privileged login with MFA; validate exemptions list is approved and monitored."],"q":["Baseline/Target: MFA enforced for privileged access (Conditional Access / PAM / VPN/RDP MFA).\nWhere MFA not possible: smartcard/cert logon for Tier-0 admins.","Where: Depends on stack: Entra ID / VPN / PAM / NPS extension; not purely GPO.","Evidence: Evidence of policy (Conditional Access / PAM config) and coverage list of privileged accounts."]},{"i":"ADGPO-ASMT-C-01","t":"Inactive users disabled (>90 days)","d":"Reduces the pool of dormant accounts that attackers can abuse or re-activate.","p":"Medium","e":"Export of inactive accounts list and disablement proof.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Disable users inactive for > 90 days (or per policy).","where":"Active Directory account lifecycle.","risk":"Dormant accounts often have weak monitoring and can be used for stealthy access or persistence.","assessment":"Query accounts with lastLogonTimestamp > 90 days; confirm exceptions (seasonal staff).","config":"Use PowerShell: Search-ADAccount -AccountInactive -UsersOnly -TimeSpan 90.00:00:00.\nDisable accounts; move to a disabled OU; set retention/cleanup schedule.","validation":"Re-run query after remediation; confirm no privileged accounts included.","inspiredBy":"ISO 27001 user lifecycle.; SOC 2 CC6.3."},"s":["Assess: Query accounts with lastLogonTimestamp > 90 days; confirm exceptions (seasonal staff).","Implement: Use PowerShell: Search-ADAccount -AccountInactive -UsersOnly -TimeSpan 90.00:00:00.","Evidence: Export of inactive accounts list and disablement proof.","Validate: Re-run query after remediation; confirm no privileged accounts included."],"q":["Baseline/Target: Disable users inactive for > 90 days (or per policy).","Where: Active Directory account lifecycle.","Evidence: Export of inactive accounts list and disablement proof."]},{"i":"ADGPO-ASMT-C-02","t":"Never logged-on users reviewed","d":"Identifies provisioned-but-unused identities that may indicate process issues or shadow accounts.","p":"Medium","e":"Export of never-logon accounts and review notes.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":2,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Review accounts with lastLogonTimestamp empty/0; remove or disable if not needed.","where":"Active Directory hygiene.","risk":"Unused accounts are easy to forget and can be abused; indicates weak joiner governance.","assessment":"Extract list of never-logged-on accounts; validate with HR/IT joiner records.","config":"PowerShell: Get-ADUser -Filter * -Properties lastLogonTimestamp | where { -not $_.lastLogonTimestamp }.\nDisable/expire as appropriate; fix joiner process if frequent.","validation":"Track trend over time; ensure joiner workflow improvements.","inspiredBy":"ISO 27001 identity lifecycle.; SOC 2 CC6.3."},"s":["Assess: Extract list of never-logged-on accounts; validate with HR/IT joiner records.","Implement: PowerShell: Get-ADUser -Filter * -Properties lastLogonTimestamp | where { -not $_.lastLogonTimestamp }.","Evidence: Export of never-logon accounts and review notes.","Validate: Track trend over time; ensure joiner workflow improvements."],"q":["Baseline/Target: Review accounts with lastLogonTimestamp empty/0; remove or disable if not needed.","Where: Active Directory hygiene.","Evidence: Export of never-logon accounts and review notes."]},{"i":"ADGPO-ASMT-C-03","t":"Guest/external accounts reviewed","d":"Ensures guest accounts (or special access accounts) are controlled, time-bound, and monitored.","p":"High","e":"Account list with sponsor/expiry; OU/GPO restrictions evidence.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"All guest accounts have sponsor, expiry date, and least privilege.","where":"Active Directory governance.","risk":"Unmanaged guest accounts become long-lived backdoors.","assessment":"Identify guest/shared accounts; review group membership and expiry.","config":"Create dedicated OU + GPO restrictions for guest accounts (deny local logon where appropriate).\nEnforce expiry and sponsor ownership in process.","validation":"Validate guest accounts cannot access privileged resources; review quarterly.","inspiredBy":"ISO 27001 access control.; SOC 2 logical access.; CIS Controls."},"s":["Assess: Identify guest/shared accounts; review group membership and expiry.","Implement: Create dedicated OU + GPO restrictions for guest accounts (deny local logon where appropriate).","Evidence: Account list with sponsor/expiry; OU/GPO restrictions evidence.","Validate: Validate guest accounts cannot access privileged resources; review quarterly."],"q":["Baseline/Target: All guest accounts have sponsor, expiry date, and least privilege.","Where: Active Directory governance.","Evidence: Account list with sponsor/expiry; OU/GPO restrictions evidence."]},{"i":"ADGPO-ASMT-C-04","t":"No regular users in privileged groups","d":"Prevents accidental/unauthorized privilege accumulation.","p":"High","e":"Group membership exports; change approvals.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Privileged groups contain only approved admins; no end-users.","where":"Active Directory group governance.","risk":"Regular users in privileged groups often leads to silent escalation and domain compromise.","assessment":"Export privileged groups (Domain Admins, Server Admins, local admin via GPO) and check for user accounts.","config":"Remove users; implement role-based groups and delegation model.\nUse GPO Restricted Groups or Local Users and Groups to control local admin membership.","validation":"Re-run checks weekly/monthly; alert on membership changes.","inspiredBy":"CIS Controls v8.; NIST AC-6.; ISO privileged access rights."},"s":["Assess: Export privileged groups (Domain Admins, Server Admins, local admin via GPO) and check for user accounts.","Implement: Remove users; implement role-based groups and delegation model.","Evidence: Group membership exports; change approvals.","Validate: Re-run checks weekly/monthly; alert on membership changes."],"q":["Baseline/Target: Privileged groups contain only approved admins; no end-users.","Where: Active Directory group governance.","Evidence: Group membership exports; change approvals."]},{"i":"ADGPO-ASMT-C-05","t":"Joiner process exists (documented + enforced)","d":"Ensures consistent provisioning, least privilege, and auditability when new users are added.","p":"Medium","e":"Process document, sample tickets/approvals (redacted).","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Documented workflow; approvals; baseline group assignment; MFA enrollment; asset assignment.","where":"Process + technical enforcement.","risk":"Weak joiner processes create overprivilege and inconsistent security baselines.","assessment":"Review HR/IT onboarding workflow, approvals, and evidence trail.","config":"Implement a standard request + approval flow; map roles to AD groups; enforce baseline security settings via OU + GPO.","validation":"Spot-check recent joiners for correct groups and policies.","inspiredBy":"ISO 27001 user onboarding.; SOC 2 CC6.1."},"s":["Assess: Review HR/IT onboarding workflow, approvals, and evidence trail.","Implement: Implement a standard request + approval flow; map roles to AD groups; enforce baseline security settings via OU + GPO.","Evidence: Process document, sample tickets/approvals (redacted).","Validate: Spot-check recent joiners for correct groups and policies."],"q":["Baseline/Target: Documented workflow; approvals; baseline group assignment; MFA enrollment; asset assignment.","Where: Process + technical enforcement.","Evidence: Process document, sample tickets/approvals (redacted)."]},{"i":"ADGPO-ASMT-C-06","t":"Mover process exists","d":"Ensures permissions change when users change roles, preventing privilege creep.","p":"Medium","e":"Sample mover tickets; before/after group membership records.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Role changes trigger access review and group membership updates.","where":"Process + governance.","risk":"Privilege creep increases insider risk and expands blast radius after compromise.","assessment":"Review mover records for last quarter; compare job role vs group memberships.","config":"Implement change workflow with approvals; periodic access review for high-risk roles.","validation":"Run access reviews; confirm removals executed.","inspiredBy":"ISO 27001 access rights changes.; SOC 2 CC6.3."},"s":["Assess: Review mover records for last quarter; compare job role vs group memberships.","Implement: Implement change workflow with approvals; periodic access review for high-risk roles.","Evidence: Sample mover tickets; before/after group membership records.","Validate: Run access reviews; confirm removals executed."],"q":["Baseline/Target: Role changes trigger access review and group membership updates.","Where: Process + governance.","Evidence: Sample mover tickets; before/after group membership records."]},{"i":"ADGPO-ASMT-C-07","t":"Leaver process exists","d":"Ensures immediate revocation of access to prevent ex-employee access and reduce account reuse risk.","p":"High","e":"Termination sample evidence (redacted) showing disable time and group removal.","sec":"Category C","meta":{"category":"C","categoryName":"Category C","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Disable accounts immediately on termination; remove tokens/remote access; handle mailbox/archive.","where":"Process + AD operations.","risk":"Leaver gaps are a common cause of unauthorized access and audit findings.","assessment":"Check termination timeline vs disablement timestamps.","config":"Automate disablement where possible; move to disabled OU; remove from groups; reset password; expire sessions.","validation":"Verify no leaver accounts remain active; monthly audit.","inspiredBy":"ISO 27001 offboarding.; SOC 2 CC6.3.\nSection D – Group Policy Security & Governance"},"s":["Assess: Check termination timeline vs disablement timestamps.","Implement: Automate disablement where possible; move to disabled OU; remove from groups; reset password; expire sessions.","Evidence: Termination sample evidence (redacted) showing disable time and group removal.","Validate: Verify no leaver accounts remain active; monthly audit."],"q":["Baseline/Target: Disable accounts immediately on termination; remove tokens/remote access; handle mailbox/archive.","Where: Process + AD operations.","Evidence: Termination sample evidence (redacted) showing disable time and group removal."]},{"i":"ADGPO-ASMT-D-01","t":"Default Domain Policy hardened (avoid misuse)","d":"Ensures the Default Domain Policy contains only domain-wide baseline settings and is not overloaded with unrelated configs.","p":"Medium","e":"GPO report export; list of settings migrated.","sec":"Category D","meta":{"category":"D","categoryName":"Category D","severity":2,"importance":2,"weight":1,"maxContribution":0.7,"baseline":"Default Domain Policy limited to account policies and essential domain baselines.","where":"GPMC / Default Domain Policy.","risk":"Overloaded DDP increases change risk and makes it harder to audit; mistakes affect the whole domain.","assessment":"Review DDP for non-baseline settings and risky configurations.","config":"Move non-baseline settings to dedicated baseline GPOs linked to appropriate OUs.\nKeep account policy settings in DDP or FGPP.","validation":"Validate resultant settings and link order; ensure no unintended inheritance.","inspiredBy":"Microsoft GPO best practices.; CIS Benchmarks."},"s":["Assess: Review DDP for non-baseline settings and risky configurations.","Implement: Move non-baseline settings to dedicated baseline GPOs linked to appropriate OUs.","Evidence: GPO report export; list of settings migrated.","Validate: Validate resultant settings and link order; ensure no unintended inheritance."],"q":["Baseline/Target: Default Domain Policy limited to account policies and essential domain baselines.","Where: GPMC / Default Domain Policy.","Evidence: GPO report export; list of settings migrated."]},{"i":"ADGPO-ASMT-D-02","t":"Default Domain Controllers Policy hardened","d":"Ensures DC-specific security baselines are enforced consistently across all Domain Controllers.","p":"High","e":"GPO report export for DC policy.","sec":"Category D","meta":{"category":"D","categoryName":"Category D","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"DC baseline GPO contains DC hardening, LDAP signing, auditing, and restricted rights.","where":"Default Domain Controllers Policy (linked to Domain Controllers OU).","risk":"Weak DC policy enables credential theft, DC lateral movement, and undetected identity compromise.","assessment":"Review policy settings, especially authentication and auditing controls.","config":"GPMC -> Default Domain Controllers Policy -> apply DC baseline settings (LDAP signing, auditing, user rights, firewall where appropriate).\nAvoid placing workstation settings in DC policy.","validation":"Validate applied settings on DCs via gpresult and security policy export.","inspiredBy":"Microsoft security baselines.; CIS Benchmarks (DC).; ISO 27001."},"s":["Assess: Review policy settings, especially authentication and auditing controls.","Implement: GPMC -> Default Domain Controllers Policy -> apply DC baseline settings (LDAP signing, auditing, user rights, firewall where appropriate).","Evidence: GPO report export for DC policy.","Validate: Validate applied settings on DCs via gpresult and security policy export."],"q":["Baseline/Target: DC baseline GPO contains DC hardening, LDAP signing, auditing, and restricted rights.","Where: Default Domain Controllers Policy (linked to Domain Controllers OU).","Evidence: GPO report export for DC policy."]},{"i":"ADGPO-ASMT-D-03","t":"No conflicting password policies","d":"Prevents accidental weaker password rules due to misconfigured FGPP scope or multiple baselines.","p":"High","e":"Export of FGPP objects + precedence + assignments.","sec":"Category D","meta":{"category":"D","categoryName":"Category D","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Password rules are deterministic; FGPP is documented and scoped correctly.","where":"AD FGPP + DDP review.","risk":"Conflicts can silently downgrade security for key accounts, enabling compromise.","assessment":"Identify all FGPP objects and their precedence; verify group targeting.","config":"Document FGPP 1 config mgmt."},"s":["Assess: Review GPO delegation and OU link permissions; identify overbroad rights.","Implement: In GPMC: for each baseline GPO, open Delegation tab and restrict Edit/Delete/Modify Security.","Evidence: Screenshots/exports of delegation settings for key GPOs; OU security evidence.","Validate: Attempt unauthorized edit/link in controlled test; monitor for GPO change events."],"q":["Baseline/Target: Only a small controlled group can edit GPOs; link rights controlled; GPO ownership standardized.","Where: GPMC delegation on GPOs and OU links.","Evidence: Screenshots/exports of delegation settings for key GPOs; OU security evidence."]},{"i":"ADGPO-ASMT-D-05","t":"Only administrators can edit GPOs (change authority)","d":"Enforces formal change authority and separation of duties for policy modifications.","p":"High","e":"Change tickets + GPO backup proof + delegation evidence.","sec":"Category D","meta":{"category":"D","categoryName":"Category D","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Dedicated GPO Admin group; changes require approval and are logged.","where":"Governance + GPMC delegation.","risk":"Uncontrolled changes cause outages and enable stealthy policy backdoors.","assessment":"Verify who has edit rights; review change records for last period.","config":"Create a dedicated \"GPO-Admins\" group; assign edit rights.\nImplement a change request workflow and require GPO backups before modification.","validation":"Random sample audit of last 5 changes.","inspiredBy":"ISO 27001 change management.; SOC 2 change controls.; CIS config management."},"s":["Assess: Verify who has edit rights; review change records for last period.","Implement: Create a dedicated \"GPO-Admins\" group; assign edit rights.","Evidence: Change tickets + GPO backup proof + delegation evidence.","Validate: Random sample audit of last 5 changes."],"q":["Baseline/Target: Dedicated GPO Admin group; changes require approval and are logged.","Where:
