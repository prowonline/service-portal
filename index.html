audit complexity.","assessment":"Run GPO reports to identify unlinked and disabled GPOs.","config":"GPMC -> Group Policy Objects -> identify unlinked GPOs.\nBackup then delete unused GPOs; document staging exceptions.","validation":"Re-run orphan scan post-cleanup.","inspiredBy":"CIS config management.; ISO 27001 configuration management."},"s":["Assess: Run GPO reports to identify unlinked and disabled GPOs.","Implement: GPMC -> Group Policy Objects -> identify unlinked GPOs.","Evidence: Export of orphaned GPO list; deletion/backup records.","Validate: Re-run orphan scan post-cleanup."],"q":["Baseline/Target: No unlinked/unused GPOs unless documented for staging.","Where: GPMC.","Evidence: Export of orphaned GPO list; deletion/backup records."]},{"i":"ADGPO-ASMT-D-08","t":"Startup/logon scripts secured","d":"Prevents scripts in SYSVOL or shared locations from being modified to execute malicious code at scale.","p":"High","e":"List of scripts + ACL screenshots/export; audit settings evidence.","sec":"Category D","meta":{"category":"D","categoryName":"Category D","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Scripts stored in controlled location; ACL locked; scripts signed if feasible.","where":"GPO + file system permissions.","risk":"If attackers can modify scripts, they gain widespread code execution and persistence.","assessment":"Identify scripts configured in GPOs; check storage path and NTFS/SYSVOL permissions.","config":"GPMC -> GPO -> User/Computer Configuration -> Policies -> Windows Settings -> Scripts (Logon/Startup).\nMove scripts to dedicated secured SYSVOL folder or share.\nRestrict write access to a small admin group; enable auditing; consider code signing.","validation":"Validate script hashes; monitor for file changes and GPO edits.","inspiredBy":"MITRE: Logon scripts technique.; CIS Controls.; ISO 27001 change/config mgmt.\nSection E – Attack Surface Reduction"},"s":["Assess: Identify scripts configured in GPOs; check storage path and NTFS/SYSVOL permissions.","Implement: GPMC -> GPO -> User/Computer Configuration -> Policies -> Windows Settings -> Scripts (Logon/Startup).","Evidence: List of scripts + ACL screenshots/export; audit settings evidence.","Validate: Validate script hashes; monitor for file changes and GPO edits."],"q":["Baseline/Target: Scripts stored in controlled location; ACL locked; scripts signed if feasible.","Where: GPO + file system permissions.","Evidence: List of scripts + ACL screenshots/export; audit settings evidence."]},{"i":"ADGPO-ASMT-E-01","t":"SMBv1 disabled","d":"Disables legacy SMBv1 protocol, reducing exposure to known wormable vulnerabilities and downgrade risks.","p":"High","e":"SMB configuration output (PowerShell Get-SmbServerConfiguration), GPO/registry evidence.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"SMBv1 disabled on clients and servers.","where":"GPO (registry) + Windows Features management.","risk":"SMBv1 exposure enables legacy exploits and increases lateral movement risk.","assessment":"Check SMBv1 status on representative hosts; verify Windows Feature state.","config":"Preferred: disable SMBv1 feature via PowerShell/feature management.\nIf using GPO: deploy registry setting to disable SMB1 (computer startup script or GPP Registry).\nPlan phased rollout to avoid legacy device breakage.","validation":"Validate file sharing works; monitor SMB errors.","inspiredBy":"Microsoft security guidance.; CIS Benchmarks."},"s":["Assess: Check SMBv1 status on representative hosts; verify Windows Feature state.","Implement: Preferred: disable SMBv1 feature via PowerShell/feature management.","Evidence: SMB configuration output (PowerShell Get-SmbServerConfiguration), GPO/registry evidence.","Validate: Validate file sharing works; monitor SMB errors."],"q":["Baseline/Target: SMBv1 disabled on clients and servers.","Where: GPO (registry) + Windows Features management.","Evidence: SMB configuration output (PowerShell Get-SmbServerConfiguration), GPO/registry evidence."]},{"i":"ADGPO-ASMT-E-02","t":"SMB signing enabled","d":"Prevents SMB man-in-the-middle and session tampering in many scenarios.","p":"Medium","e":"GPO report showing both settings; spot-check server config output.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":2,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Enable SMB signing for clients and servers (as feasible).","where":"GPO Security Options.","risk":"Without signing, attackers can tamper with SMB sessions or relay traffic in some environments.","assessment":"Check current SMB signing settings on domain members and servers.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nSet: Microsoft network client: Digitally sign communications (always) = Enabled.\nSet: Microsoft network server: Digitally sign communications (always) = Enabled.","validation":"Validate SMB connectivity; watch for legacy device failures.","inspiredBy":"CIS Benchmarks (Windows)."},"s":["Assess: Check current SMB signing settings on domain members and servers.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report showing both settings; spot-check server config output.","Validate: Validate SMB connectivity; watch for legacy device failures."],"q":["Baseline/Target: Enable SMB signing for clients and servers (as feasible).","Where: GPO Security Options.","Evidence: GPO report showing both settings; spot-check server config output."]},{"i":"ADGPO-ASMT-E-03","t":"NTLM restricted (audit->restrict->deny)","d":"Reduces credential relay and legacy authentication abuse by limiting NTLM usage.","p":"High","e":"GPO report of Restrict NTLM settings; NTLM audit logs; exception list.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"Phase 1: Enable NTLM auditing.\nPhase 2: Restrict where possible.\nPhase 3: Deny NTLM where feasible (exception-driven).","where":"GPO Security Options (domain members + DCs).","risk":"NTLM enables relay attacks and credential interception; unrestricted NTLM is a common enterprise attack path.","assessment":"Enable NTLM auditing to identify dependencies (event logs).\nDocument apps/systems requiring NTLM.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nConfigure: Network security: Restrict NTLM (several settings) to start in Audit mode.\nAfter dependency analysis, move to Deny for domain accounts where safe.","validation":"Validate business apps; monitor NTLM usage trend down.","inspiredBy":"Microsoft NTLM hardening guidance.; CIS Benchmarks.; MITRE relay techniques."},"s":["Assess: Enable NTLM auditing to identify dependencies (event logs).","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report of Restrict NTLM settings; NTLM audit logs; exception list.","Validate: Validate business apps; monitor NTLM usage trend down."],"q":["Baseline/Target: Phase 1: Enable NTLM auditing.\nPhase 2: Restrict where possible.\nPhase 3: Deny NTLM where feasible (exception-driven).","Where: GPO Security Options (domain members + DCs).","Evidence: GPO report of Restrict NTLM settings; NTLM audit logs; exception list."]},{"i":"ADGPO-ASMT-E-04","t":"LM authentication disabled (force NTLMv2 only)","d":"Prevents the weakest LAN Manager authentication methods and reduces credential downgrade risk.","p":"High","e":"GPO report showing both settings.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"LAN Manager authentication level: Send NTLMv2 response only. Refuse LM & NTLM.\nDo not store LM hash value on next password change = Enabled.","where":"GPO Security Options.","risk":"LM/NTLMv1 are crackable and enable downgrade attacks, accelerating credential theft.","assessment":"Check current LAN Manager authentication level and LM hash storage setting.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nSet: Network security: LAN Manager authentication level = Send NTLMv2 response only. Refuse LM & NTLM.\nEnable: Network security: Do not store LAN Manager hash value on next password change.","validation":"Validate legacy systems; monitor auth failures; document exceptions.","inspiredBy":"CIS Benchmarks (Windows).; Microsoft auth guidance."},"s":["Assess: Check current LAN Manager authentication level and LM hash storage setting.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report showing both settings.","Validate: Validate legacy systems; monitor auth failures; document exceptions."],"q":["Baseline/Target: LAN Manager authentication level: Send NTLMv2 response only. Refuse LM & NTLM.\nDo not store LM hash value on next password change = Enabled.","Where: GPO Security Options.","Evidence: GPO report showing both settings."]},{"i":"ADGPO-ASMT-E-05","t":"LLMNR disabled","d":"Prevents local name resolution poisoning attacks that steal credentials (e.g., responder-style attacks).","p":"High","e":"GPO report showing LLMNR disabled.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Turn off multicast name resolution = Enabled.","where":"GPO Administrative Templates.","risk":"If enabled, attackers on the same network can spoof name resolution and capture hashes/credentials.","assessment":"Check if LLMNR is disabled in current baseline.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Network -> DNS Client.\nSet: Turn off multicast name resolution = Enabled.","validation":"Validate no LLMNR traffic observed; confirm DNS resolution works.","inspiredBy":"CIS Benchmarks.; MITRE credential access techniques."},"s":["Assess: Check if LLMNR is disabled in current baseline.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Network -> DNS Client.","Evidence: GPO report showing LLMNR disabled.","Validate: Validate no LLMNR traffic observed; confirm DNS resolution works."],"q":["Baseline/Target: Turn off multicast name resolution = Enabled.","Where: GPO Administrative Templates.","Evidence: GPO report showing LLMNR disabled."]},{"i":"ADGPO-ASMT-E-06","t":"NetBIOS over TCP/IP disabled (where feasible)","d":"Reduces legacy name resolution and broadcast traffic that can be abused for discovery and spoofing.","p":"Medium","e":"Network capture/host config evidence showing NetBIOS disabled; exception list.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":2,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Disable NetBIOS over TCP/IP on domain endpoints where feasible.","where":"Usually via DHCP scope option or scripted configuration; not a clean single GPO setting.","risk":"NetBIOS aids legacy attacks and credential interception on flat networks; disabling reduces exposure.","assessment":"Identify systems relying on NetBIOS/legacy apps; confirm feasibility.","config":"Preferred: enforce via DHCP (NetBIOS Node Type/option) or endpoint management scripting.\nAlternative: GPO startup script to disable NetBIOS per interface (requires careful testing).","validation":"Validate file/print discovery and legacy apps; monitor name resolution issues.","inspiredBy":"CIS Benchmarks (general hardening)."},"s":["Assess: Identify systems relying on NetBIOS/legacy apps; confirm feasibility.","Implement: Preferred: enforce via DHCP (NetBIOS Node Type/option) or endpoint management scripting.","Evidence: Network capture/host config evidence showing NetBIOS disabled; exception list.","Validate: Validate file/print discovery and legacy apps; monitor name resolution issues."],"q":["Baseline/Target: Disable NetBIOS over TCP/IP on domain endpoints where feasible.","Where: Usually via DHCP scope option or scripted configuration; not a clean single GPO setting.","Evidence: Network capture/host config evidence showing NetBIOS disabled; exception list."]},{"i":"ADGPO-ASMT-E-07","t":"LDAP signing required","d":"Prevents LDAP traffic tampering and reduces credential relay/downgrade opportunities against DCs.","p":"High","e":"GPO report showing LDAP signing settings on DC and clients; exception list.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":3,"weight":3,"maxContribution":2.2,"baseline":"DCs: LDAP server signing requirements = Require signing.\nClients: LDAP client signing requirements = Require signing (as feasible).","where":"Default Domain Controllers Policy (DC) + baseline GPO for domain members.","risk":"If not enforced, LDAP sessions may be vulnerable to tampering/relay, enabling credential theft and directory abuse.","assessment":"Check DC LDAP signing requirement; check clients (servers/workstations) where applicable.","config":"GPMC -> Default Domain Controllers Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nSet: Domain controller: LDAP server signing requirements = Require signing.\nOptionally set: Network security: LDAP client signing requirements = Require signing (test for app compatibility).","validation":"Validate application binds; monitor DC LDAP events after enforcement.","inspiredBy":"Microsoft LDAP signing guidance.; CIS Benchmarks.; ISO 27001 secure auth."},"s":["Assess: Check DC LDAP signing requirement; check clients (servers/workstations) where applicable.","Implement: GPMC -> Default Domain Controllers Policy -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report showing LDAP signing settings on DC and clients; exception list.","Validate: Validate application binds; monitor DC LDAP events after enforcement."],"q":["Baseline/Target: DCs: LDAP server signing requirements = Require signing.\nClients: LDAP client signing requirements = Require signing (as feasible).","Where: Default Domain Controllers Policy (DC) + baseline GPO for domain members.","Evidence: GPO report showing LDAP signing settings on DC and clients; exception list."]},{"i":"ADGPO-ASMT-E-08","t":"Unconstrained delegation eliminated","d":"Removes highly risky delegation configuration that can allow attackers to steal or replay Kerberos tickets.","p":"High","e":"Export of identified objects and remediation actions; exception register.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":3,"importance":3,"weight":3,"maxContribution":2.1,"baseline":"No accounts/computers configured for unconstrained delegation unless explicitly justified (rare).","where":"AD object configuration.","risk":"Unconstrained delegation is a common path to Tier-0 compromise via ticket theft and lateral movement.","assessment":"Query for accounts/computers with unconstrained delegation enabled.\nReview legacy systems and migrate to constrained delegation if needed.","config":"PowerShell: Get-ADComputer -Filter {TrustedForDelegation -eq $true} -Properties TrustedForDelegation.\nDisable unconstrained delegation; implement constrained delegation or resource-based constrained delegation as needed.","validation":"Validate service functionality; monitor Kerberos tickets and delegation-related errors.","inspiredBy":"Microsoft Kerberos delegation guidance.; CIS Benchmarks.; MITRE delegation abuse."},"s":["Assess: Query for accounts/computers with unconstrained delegation enabled.","Implement: PowerShell: Get-ADComputer -Filter {TrustedForDelegation -eq $true} -Properties TrustedForDelegation.","Evidence: Export of identified objects and remediation actions; exception register.","Validate: Validate service functionality; monitor Kerberos tickets and delegation-related errors."],"q":["Baseline/Target: No accounts/computers configured for unconstrained delegation unless explicitly justified (rare).","Where: AD object configuration.","Evidence: Export of identified objects and remediation actions; exception register."]},{"i":"ADGPO-ASMT-E-09","t":"Session timeouts / inactivity limits","d":"Limits exposure from unattended sessions and reduces window for session hijack/abuse.","p":"Medium","e":"GPO report showing inactivity limit and RDP settings.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":2,"importance":1,"weight":1,"maxContribution":0.7,"baseline":"Interactive logon: machine inactivity limit (e.g., 900 seconds).\nRDP session timeouts defined for admin sessions.","where":"GPO Security Options + RDS administrative templates.","risk":"If not set, unattended sessions increase risk of insider misuse and opportunistic compromise.","assessment":"Check machine inactivity limit and RDP session settings.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nSet: Interactive logon: Machine inactivity limit (seconds).\nFor RDP: Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> Remote Desktop Services -> Remote Desktop Session Host -> Session Time Limits.","validation":"Validate lock behavior and session disconnect policies.","inspiredBy":"ISO 27001 access control.; CIS Benchmarks."},"s":["Assess: Check machine inactivity limit and RDP session settings.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report showing inactivity limit and RDP settings.","Validate: Validate lock behavior and session disconnect policies."],"q":["Baseline/Target: Interactive logon: machine inactivity limit (e.g., 900 seconds).\nRDP session timeouts defined for admin sessions.","Where: GPO Security Options + RDS administrative templates.","Evidence: GPO report showing inactivity limit and RDP settings."]},{"i":"ADGPO-ASMT-E-10","t":"Machine account password rotation (session key rotation)","d":"Ensures computer accounts rotate their machine account passwords, reducing long-lived credential exposure.","p":"Medium","e":"GPO report showing maximum machine account password age.","sec":"Category E","meta":{"category":"E","categoryName":"Category E","severity":2,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Domain member: Maximum machine account password age = 30 days (baseline).","where":"Baseline GPO applied to domain members.","risk":"If disabled or too long, attackers with machine account secrets gain longer persistence and lateral movement options.","assessment":"Check current machine account password age policy and whether any legacy systems block rotation.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.\nSet: Domain member: Maximum machine account password age = 30.","validation":"Validate machine account password change events occur; monitor for failures.","inspiredBy":"CIS Benchmarks (Windows).; Microsoft security baseline.\nSection F – Computer & Server Hardening (via GPO)"},"s":["Assess: Check current machine account password age policy and whether any legacy systems block rotation.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Local Policies -> Security Options.","Evidence: GPO report showing maximum machine account password age.","Validate: Validate machine account password change events occur; monitor for failures."],"q":["Baseline/Target: Domain member: Maximum machine account password age = 30 days (baseline).","Where: Baseline GPO applied to domain members.","Evidence: GPO report showing maximum machine account password age."]},{"i":"ADGPO-ASMT-F-01","t":"Windows Firewall enabled","d":"Ensures host-based firewall is enabled with domain/private/public profiles managed centrally.","p":"High","e":"GPO report; spot-check firewall status via netsh or PowerShell.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Firewall enabled for all profiles; inbound rules minimal; logging enabled (where feasible).","where":"Baseline GPO for workstations/servers (separate if needed).","risk":"If disabled, lateral movement and remote exploitation become easier; segmentation relies solely on network controls.","assessment":"Check firewall state across representative hosts and OU coverage.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Windows Defender Firewall with Advanced Security.\nEnable firewall for each profile; define inbound/outbound policy; configure logging.","validation":"Validate required app ports; monitor dropped packets/logging.","inspiredBy":"Microsoft security baseline.; CIS Benchmarks."},"s":["Assess: Check firewall state across representative hosts and OU coverage.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Windows Defender Firewall with Advanced Security.","Evidence: GPO report; spot-check firewall status via netsh or PowerShell.","Validate: Validate required app ports; monitor dropped packets/logging."],"q":["Baseline/Target: Firewall enabled for all profiles; inbound rules minimal; logging enabled (where feasible).","Where: Baseline GPO for workstations/servers (separate if needed).","Evidence: GPO report; spot-check firewall status via netsh or PowerShell."]},{"i":"ADGPO-ASMT-F-02","t":"Microsoft Defender Antivirus enabled (or approved equivalent)","d":"Ensures baseline anti-malware protection is active and centrally governed.","p":"High","e":"GPO report; endpoint security center evidence.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"Defender enabled and not disabled by conflicting GPO; exclusions controlled.","where":"GPO (if Defender used) or product policy if third-party.","risk":"If AV disabled or misconfigured, commodity malware becomes a direct path to credential theft and domain compromise.","assessment":"Check AV status, exclusions, tamper protections, and update cadence.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> Microsoft Defender Antivirus.\nSet: Turn off Microsoft Defender Antivirus = Disabled (meaning Defender on).\nConfigure cloud-delivered protection and sample submission per policy.","validation":"Validate Defender running; test EICAR in controlled environment (optional).","inspiredBy":"Microsoft security baseline.; CIS Benchmarks."},"s":["Assess: Check AV status, exclusions, tamper protections, and update cadence.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> Microsoft Defender Antivirus.","Evidence: GPO report; endpoint security center evidence.","Validate: Validate Defender running; test EICAR in controlled environment (optional)."],"q":["Baseline/Target: Defender enabled and not disabled by conflicting GPO; exclusions controlled.","Where: GPO (if Defender used) or product policy if third-party.","Evidence: GPO report; endpoint security center evidence."]},{"i":"ADGPO-ASMT-F-03","t":"Real-time protection enabled","d":"Ensures malware scanning occurs at execution time, not only on-demand.","p":"High","e":"GPO report showing RT protection enabled.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Real-time protection enabled; periodic scans scheduled.","where":"Defender policy via GPO.","risk":"Without real-time scanning, malware can run and persist unnoticed between scans.","assessment":"Verify setting and that users cannot disable it.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> Microsoft Defender Antivirus -> Real-time Protection.\nEnable: Turn off real-time protection = Disabled.","validation":"Validate via endpoint status and event logs.","inspiredBy":"Microsoft baseline.; CIS Benchmarks."},"s":["Assess: Verify setting and that users cannot disable it.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> Microsoft Defender Antivirus -> Real-time Protec…","Evidence: GPO report showing RT protection enabled.","Validate: Validate via endpoint status and event logs."],"q":["Baseline/Target: Real-time protection enabled; periodic scans scheduled.","Where: Defender policy via GPO.","Evidence: GPO report showing RT protection enabled."]},{"i":"ADGPO-ASMT-F-04","t":"Tamper protection enabled (where supported)","d":"Prevents local attackers/malware from disabling Defender/security settings.","p":"High","e":"Screenshots/export from management console showing tamper protection enabled.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":2,"weight":2,"maxContribution":1.4,"baseline":"Tamper protection enabled via MDM/management platform (not classic GPO).","where":"Typically via Intune/MDM or security platform.","risk":"If disabled, attackers with local admin can turn off defenses before deploying payloads.","assessment":"Confirm tamper protection state on endpoints.","config":"Enable in the endpoint management platform; ensure local admins cannot disable Defender components.","validation":"Attempt controlled change as local admin in test environment; confirm blocked.","inspiredBy":"Microsoft Defender security features.; CIS Controls."},"s":["Assess: Confirm tamper protection state on endpoints.","Implement: Enable in the endpoint management platform; ensure local admins cannot disable Defender components.","Evidence: Screenshots/export from management console showing tamper protection enabled.","Validate: Attempt controlled change as local admin in test environment; confirm blocked."],"q":["Baseline/Target: Tamper protection enabled via MDM/management platform (not classic GPO).","Where: Typically via Intune/MDM or security platform.","Evidence: Screenshots/export from management console showing tamper protection enabled."]},{"i":"ADGPO-ASMT-F-05","t":"BitLocker on laptops","d":"Protects data at rest and reduces credential theft from offline disk access.","p":"High","e":"BitLocker status reports; GPO report; recovery key escrow evidence.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":3,"weight":2,"maxContribution":1.4,"baseline":"BitLocker enabled for OS drive; TPM used; recovery keys escrowed.","where":"GPO BitLocker settings (or MDM).","risk":"Without encryption, stolen devices expose data and cached credentials; supports offline attacks.","assessment":"Check BitLocker adoption and recovery key escrow.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> BitLocker Drive Encryption.\nConfigure OS drive encryption and recovery options; require TPM.","validation":"Validate recovery process; check BitLocker status on sample devices.","inspiredBy":"ISO 27001 cryptography.; CIS Benchmarks.; Microsoft baseline."},"s":["Assess: Check BitLocker adoption and recovery key escrow.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Administrative Templates -> Windows Components -> BitLocker Drive Encryption.","Evidence: BitLocker status reports; GPO report; recovery key escrow evidence.","Validate: Validate recovery process; check BitLocker status on sample devices."],"q":["Baseline/Target: BitLocker enabled for OS drive; TPM used; recovery keys escrowed.","Where: GPO BitLocker settings (or MDM).","Evidence: BitLocker status reports; GPO report; recovery key escrow evidence."]},{"i":"ADGPO-ASMT-F-06","t":"Users not local administrators","d":"Minimizes local privilege to reduce malware impact and credential theft opportunities.","p":"High","e":"GPO report; local group membership export on sample hosts.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":3,"weight":3,"maxContribution":2.1,"baseline":"Standard users not in local Administrators group; use controlled elevation.","where":"GPO Restricted Groups / Local Users and Groups.","risk":"If users are local admins, malware gains full control, can dump credentials, and pivot to domain compromise.","assessment":"Check local admin membership on endpoints and servers.","config":"GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Restricted Groups (legacy) OR Preferences -> Local Users and Groups.\nDefine local Administrators membership explicitly (e.g., local admin, IT support group, exclude Domain Users).","validation":"Validate via gpresult; run a local admin check script across fleet.","inspiredBy":"CIS Controls.; NIST AC-6.; ISO privileged access."},"s":["Assess: Check local admin membership on endpoints and servers.","Implement: GPMC -> baseline GPO -> Computer Configuration -> Policies -> Windows Settings -> Security Settings -> Restricted Groups (legacy) OR Preferences -> Local Users …","Evidence: GPO report; local group membership export on sample hosts.","Validate: Validate via gpresult; run a local admin check script across fleet."],"q":["Baseline/Target: Standard users not in local Administrators group; use controlled elevation.","Where: GPO Restricted Groups / Local Users and Groups.","Evidence: GPO report; local group membership export on sample hosts."]},{"i":"ADGPO-ASMT-F-07","t":"Local admin passwords managed (LAPS/Windows LAPS)","d":"Randomizes local admin passwords per device to prevent lateral movement using shared local credentials.","p":"High","e":"GPO report; AD permissions evidence on LAPS attributes; rotation logs.","sec":"Category F","meta":{"category":"F","categoryName":"Category F","severity":3,"importance":3,"weight":3,"maxContribution":2.1,"baseline":"Deploy Windows LAPS (preferred) or legacy LAPS; store passwords in AD securely; rotate regularly.","where":"GPO Administrative Templates -> System -> LAPS.","risk":"Without LAPS, attackers reuse local admin credentials to move laterally (pass-the-hash/local admin reuse).","assessment":"Check if LAPS is deployed, configured, and rotating; verify ACL on password attributes.","config":"Deploy Windows LAPS settings via GPO (path depends on ADMX present): Administrative Templates -> System -> LAPS.\nConfigure password complexity/length, rotation schedule, and storage options.\nEnsure only authorized groups can read LAPS passwords in AD.","validation":"Validate password rotation; attempt unauthorized read in test.","inspiredBy":"Microsoft LAPS guidance.; CIS Benchmarks.; MITRE lateral movement techniques.\nSection G – Logging & Auditing"},"s":["Assess: Check if LAPS is deployed, configured, and rotating; verify ACL on password attributes.","Implement: Deploy Windows LAPS settings via GPO (path depends on ADMX present): Administrative Templates -> System -> LAPS.","Evidence: GPO report; AD permissions evidenc RAW[PAMSA_FW]=PAMSA_CONTROLS;
const TOTAL_CONTROLS=FRAMEWORKS.reduce((s,fw)=>s+RAW[fw].length,0);

// ─── SIMILARITY / OVERLAP (Services) ────────────────────────────────────────
const STOPWORDS=new Set([
  "a","an","and","or","the","to","of","for","in","on","with","by","via","across","all","any","each","per",
  "ensure","define","implement","enforce","enforced","configure","configured","enable","enabled","disable","disabled",
  "apply","applied","set","use","using","require","required","must","should","management","process","controls","control"
]);

const normalizeTitle=(t)=>{
  if(!t)return"";
  let s=(""+t).toLowerCase();
  s=s.replace(/&/g," and ");
  // common expansions
  s=s.replace(/\bmfa\b/g," multi factor authentication ");
  s=s.replace(/\b2fa\b/g," multi factor authentication ");
  s=s.replace(/\bgpo\b/g," group policy ");
  s=s.replace(/\bad\b/g," active directory ");
  s=s.replace(/\bentra\b/g," entra id ");
  s=s.replace(/\bldap\b/g," ldap ");
  s=s.replace(/\blaps\b/g," laps ");
  s=s.replace(/[^a-z0-9\s]/g," ");
  s=s.replace(/\s+/g," ").trim();
  return s;
};

const titleTokens=(t)=>{
  const s=normalizeTitle(t);
  const parts=s.split(" ").filter(w=>w && w.length>2 && !STOPWORDS.has(w));
  return new Set(parts);
};

const jaccard=(A,B)=>{
  if(!A.size || !B.size)return 0;
  let inter=0;
  for(const a of A)if(B.has(a))inter++;
  const uni=A.size+B.size-inter;
  return uni?inter/uni:0;
};

function buildSimilarControlGroups(raw, fws){
  // Build nodes
  const nodes=[];
  const byFw={};
  for(const fw of fws){
    const arr=raw[fw]||[];
    byFw[fw]=[];
    for(const c of arr){
      const tok=titleTokens(c.t);
      nodes.push({fw,id:c.i,title:c.t,desc:c.d||"",tokens:tok,mc:(c?.meta?.maxContribution??1),prio:c.p||"Medium",section:c.sec||""});
      byFw[fw].push(nodes.length-1);
    }
  }

  // DSU
  const parent=Array(nodes.length).fill(0).map((_,i)=>i);
  const rank=Array(nodes.length).fill(0);
  const find=(x)=>{while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x;};
  const union=(a,b)=>{a=find(a);b=find(b);if(a===b)return; if(rank[a]<rank[b]){parent[a]=b;}else if(rank[a]>rank[b]){parent[b]=a;}else{parent[b]=a;rank[a]++;}};

  // Compare pairs only across different services
  const fwList=fws.slice();
  const minTokenOverlap=2;
  const SIM_THR=0.33;

  for(let i=0;i<fwList.length;i++){
    for(let j=i+1;j<fwList.length;j++){
      const A=byFw[fwList[i]];
      const B=byFw[fwList[j]];
      for(const ai of A){
        const ta=nodes[ai].tokens;
        if(!ta.size)continue;
        let best=-1, bestSim=0, bestInter=0;
        for(const bi of B){
          const tb=nodes[bi].tokens;
          if(!tb.size)continue;
          // quick reject: at least 1 token common
          let inter=0;
          for(const w of ta){ if(tb.has(w)) inter++; }
          if(inter<minTokenOverlap) continue;
          const sim=jaccard(ta,tb);
          if(sim>bestSim){bestSim=sim;best=bi;bestInter=inter;}
        }
        if(best!==-1 && bestSim>=SIM_THR){
          union(ai,best);
        }
      }
    }
  }

  // Build groups
  const groupsMap=new Map();
  for(let idx=0; idx<nodes.length; idx++){
    const r=find(idx);
    if(!groupsMap.has(r))groupsMap.set(r,[]);
    groupsMap.get(r).push(idx);
  }

  const groups=[];
  for(const [root, idxs] of groupsMap.entries()){
    const fset=new Set(idxs.map(i=>nodes[i].fw));
    if(fset.size<2) continue; // only overlaps
    const itemsByFw={};
    // choose one per fw: prefer higher maxContribution then shorter title
    for(const fw of fws){
      const cand=idxs.filter(i=>nodes[i].fw===fw);
      if(!cand.length)continue;
      cand.sort((a,b)=>{
        const da=nodes[a], db=nodes[b];
        if((db.mc||0)!==(da.mc||0)) return (db.mc||0)-(da.mc||0);
        return (da.title||"").length-(db.title||"").length;
      });
      itemsByFw[fw]=nodes[cand[0]];
    }
    const labelCandidates=Object.values(itemsByFw).map(x=>x.title).filter(Boolean);
    labelCandidates.sort((a,b)=>a.length-b.length);
    const label=labelCandidates[0]||"Overlap";
    const score=Object.values(itemsByFw).reduce((s,x)=>s+(x.mc||0),0);
    groups.push({label,itemsByFw,services:[...fset],score});
  }

  // sort: most services, then highest score
  groups.sort((a,b)=> (b.services.length-a.services.length) || (b.score-a.score) || (a.label.localeCompare(b.label)));
  return groups;
}

// ─── SAMPLE DATA BUILDER ─────────────────────────────────────────────────────
function buildSampleWorkspaceData(wsId){
  const controlState=getInitState();
  const evidence={};
  const evidenceFiles={};

  const plusDays=(n)=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  const owners=["Global Admin","Compliance Manager","Information Security Officer","GRC Analyst","IT Administrator","Infrastructure Lead","SOC Lead","Security Engineer","Network Engineer","Helpdesk Manager","CISO","AD Engineer"];

  const hashStr=(s)=>{
    let h=2166136261;
    for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}
    return (h>>>0);
  };

  const scoreToStatus=(r)=>{
    // Demo spread: include explicit gaps and review states
    if(r<18)return "Compliant";
    if(r<35)return "Implemented";
    if(r<55)return "In Progress";
    if(r<70)return "Not Started";
    if(r<85)return "Non-Compliant";
    if(r<93)return "Under Review";
    return "Exception";
  };

  const statusToScore=(status,seed)=>{
    if(status==="Compliant")return 4+(seed%2);
    if(status==="Implemented")return 3+(seed%2);
    if(status==="In Progress")return 2+(seed%3);
    if(status==="Under Review")return 2;
    if(status==="Exception")return 1;
    if(status==="Non-Compliant")return 1;
    return (seed%2); // Not Started
  };

  const maturityLabel=(n)=>MATURITY[Math.max(0,Math.min(5,n))];

  const applyProgress=(fw,id,score)=>{
    const st=controlState?.[fw]?.[id];
    if(!st)return;
    const steps=Array.isArray(st.stepsDone)?st.stepsDone:[];
    const ans=Array.isArray(st.assessmentAnswers)?st.assessmentAnswers:[];
    const done=Math.round((score/5)*steps.length);
    const yes=Math.floor((score/5)*ans.length);
    controlState[fw][id]={
      ...st,
      stepsDone:steps.map((_,i)=>i<done),
      assessmentAnswers:ans.map((_,i)=> i<yes ? true : null)
    };
  };

  for(const fw of SERVICE_FWS){
    const ctrls=RAW[fw]||[];
    for(const c of ctrls){
      const seed=hashStr(fw+"::"+c.i);
      const r=seed%100;
      const status=scoreToStatus(r);
      const score=statusToScore(status,seed);
      const owner=owners[seed%owners.length];
      const targetDate = (status==="Compliant") ? plusDays(-(seed%28+2)) : plusDays((seed%45)+5);
      const priority = (c.p==="High" ? (r<70?"High":"Medium") : (c.p==="Low"?"Low":"Medium"));
      const notes = status==="Compliant"
        ? "Validated in pilot ring; evidence attached."
        : status==="In Progress"
          ? "Rolling out in rings; tracking exceptions."
          : status==="Needs Review"
            ? "Requires verification against baseline and scope."
            : "";

      if(controlState?.[fw]?.[c.i]){
        controlState[fw][c.i]={
          ...controlState[fw][c.i],
          status,priority,owner,targetDate,
          maturity:maturityLabel(score),
          notes
        };
        applyProgress(fw,c.i,score);
      }

      // Evidence completion based on score
      const evidList=(c.e||"").split(",").map(x=>x.trim()).filter(Boolean);
      if(evidList.length){
        const achieved=Math.floor((score/5)*evidList.length);
        evidence[`${fw}::${c.i}`]=evidList.map((_,i)=>i<achieved);
        if(achieved>0){
          const key=`${fw}::${c.i}::0`;
          evidenceFiles[key]={
            name:`${fw.replace(/[^A-Za-z0-9]/g,"")}_${c.i}_Evidence.pdf`,
            status:"Submitted",
            submittedAt:nowISO(),
            submittedBy:owner,
            reviewedAt:(status==="Compliant")?nowISO():null,
            reviewedBy:(status==="Compliant")?"Compliance Manager":null,
            comment:(status==="Compliant")?"Approved":"Pending review"
          };
        }
      }
    }

    // Demo: create visible overdue + explicit gaps for Gap Analysis and Owner workload
    const demoList=(RAW[fw]||[]);
    const setCtl=(c,patch,score)=>{
      if(!c||!controlState?.[fw]?.[c.i])return;
      controlState[fw][c.i]={...controlState[fw][c.i],...patch};
      applyProgress(fw,c.i,score);
      // force evidence gaps when relevant
      const evidList=(c.e||"").split(",").map(x=>x.trim()).filter(Boolean);
      if(evidList.length){
        if(patch.status==="Non-Compliant"||patch.status==="Not Started"){
          evidence[`${fw}::${c.i}`]=evidList.map(()=>false);
        }
        if(patch.status==="Under Review"){
          evidence[`${fw}::${c.i}`]=evidList.map((_,i)=>i===0); // only first
          const key=`${fw}::${c.i}::0`;
          evidenceFiles[key]={
            name:`${fw.replace(/[^A-Za-z0-9]/g,"")}_${c.i}_Evidence.pdf`,
            status:"Rejected",
            submittedAt:nowISO(),
            submittedBy:patch.owner||"IT Administrator",
            reviewedAt:nowISO(),
            reviewedBy:"Compliance Manager",
            comment:"Rejected in demo: evidence does not match control requirement."
          };
        }
      }
    };

    // Explicit gaps (past target date)
    if(demoList[0]) setCtl(demoList[0],{status:"Non-Compliant",priority:"Critical",targetDate:plusDays(-21),maturity:MATURITY[1],notes:"Gap — baseline not implemented; remediation required.",owner:"IT Administrator"},1);
    if(demoList[1]) setCtl(demoList[1],{status:"Not Started",priority:"High",targetDate:plusDays(-35),maturity:MATURITY[0],notes:"Gap — not started; scope/owner alignment pending.",owner:"Infrastructure Lead"},0);
    if(demoList[2]) setCtl(demoList[2],{status:"Under Review",priority:"Medium",targetDate:plusDays(-7),maturity:MATURITY[2],notes:"Gap — evidence rejected; update and re-submit.",owner:"Security Engineer"},2);

    // Overdue items to light up alerts
    demoList.slice(3,5).forEach((c,idx)=>{
      setCtl(c,{status:"In Progress",priority:"High",targetDate:plusDays(-10-idx),maturity:MATURITY[2],notes:"Overdue — awaiting maintenance window / CAB approval.",owner:controlState?.[fw]?.[c.i]?.owner||owners[(idx+2)%owners.length]},2);
    });
  }


  return{
    controlState,
    branding:{company:"Demo — ACME Manufacturing Ltd.",logo:"",project:"Identity & AD Security Programme — 2026"},
    snapshots:[],
    evidence,
    evidenceFiles,
    docs:[],capa:[],mappings:[],
    createdAt:nowISO()
  };
}

// ─── RADAR CHART ────────────────────────────────────────────────────────────
function RadarChart({labels,values,maxVal=5,size=240}){
  const cx=size/2,cy=size/2,r=size/2-30,n=labels.length;
  if(n<3)return null;
  const angle=(i)=>((Math.PI*2*i)/n)-Math.PI/2;
  const pts=(vals)=>vals.map((v,i)=>{const a=angle(i),d=(v/maxVal)*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)]});
  const poly=(p)=>p.map(([x,y])=>`${x},${y}`).join(' ');
  const dataPoints=pts(values);
  return(
    <svg width={size} height={size} style={{display:'block',margin:'0 auto'}}>
      {[1,2,3,4,5].map(lv=>{
        const p=pts(labels.map(()=>lv));
        return <polygon key={lv} points={poly(p)} fill="none" stroke="var(--border)" strokeWidth={lv===5?1.5:.5} strokeDasharray={lv<5?"2,2":"none"}/>;
      })}
      {labels.map((l,i)=>{
        const a=angle(i),ex=cx+(r+18)*Math.cos(a),ey=cy+(r+18)*Math.sin(a);
        return <g key={i}>
          <line x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="var(--border)" strokeWidth=".5"/>
          <text x={ex} y={ey} textAnchor="middle" dominantBaseline="central" fill="var(--text-secondary)" fontSize="9" fontFamily="Aptos, Segoe UI, system-ui, Arial, sans-serif">{l.length>14?l.slice(0,13)+'…':l}</text>
        </g>;
      })}
      <polygon points={poly(dataPoints)} fill="rgba(245,210,72,.18)" stroke="#F5D248" strokeWidth="2"/>
      {dataPoints.map(([x,y],i)=><circle key={i} cx={x} cy={y} r={3.5} fill="#F5D248" stroke="var(--bg-card)" strokeWidth="2"/>)}
    </svg>
  );
}

  // ─── applyWorkspace ──────────────────────────────────────────────────────

    // Lock background scroll when any modal is open

// ─── BOOTSTRAP (FIX: removed the stale wsId reference block) ────────────
  useEffect(()=>{
    let m=loadMeta();

       m.users.some(u=>u.id===sess.userId)&&

  // ─── AUTO-SAVE ───────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!loaded||authView!=="app"||!activeWsId||!userState||isDemoMode)return;
    const t=setTimeout(()=>saveWorkspace(activeWsId,{

    }),400);
    return()=>clearTimeout(t);
  },[loaded,authView,activeWsId,userState,branding,snapshots,evidenceState,docs,capa,mappings,isDemoMode,evidenceFiles]);

  const updateItem=useCallback((fw,id,updates)=>{
    setUserState(prev=>({...prev,[fw]:{...prev[fw],[id]:{...prev[fw][id],...updates}}}));
  },[]);

  const updateItemWithAudit=useCallback((fw,id,updates,action="Control Updated")=>{
    setUserState(prev=>{
      const old=prev[fw]?.[id]||{};
      const detail=updates.status&&updates.status!==old.status?`${old.status||"?"} → ${updates.status}`:undefined;
      setTimeout(()=>appendAudit(activeWsId,{user:meta?.users?.find(u=>u.id===session?.userId)?.name||"User",role,action,fw,control:id,detail}),0);
      return({...prev,[fw]:{...prev[fw],[id]:{...old,...updates}}});
    });
  },[activeWsId,meta,session,role]);

  // ─── STATS ───────────────────────────────────────────────────────────────
  const stats=useMemo(()=>{
    if(!userState)return{};
    const r={};
    for(const fw of FRAMEWORKS){
      const items=RAW[fw],total=items.length;
      const byStatus={},byPriority={};
      STATUSES.forEach(s=>byStatus[s]=0);PRIORITIES.forEach(p=>byPriority[p]=0);
      let totalSteps=0,doneSteps=0,maturitySum=0;

      // AD/GPO weighted posture (0–100) using Max Contribution (%)
      let wTotal=0,wAch=0,naCount=0;
      const catAgg={};

      for(const item of items){
        const st=userState[fw]?.[item.i];if(!st)continue;
        byStatus[st.status]=(byStatus[st.status]||0)+1;
        byPriority[st.priority]=(byPriority[st.priority]||0)+1;
        totalSteps+=item.s.length;doneSteps+=(st.stepsDone||[]).filter(Boolean).length;
        const score=Math.max(0,Math.min(5,parseInt(st.maturity)||0));
        maturitySum+=score;

        if(SERVICE_FWS.includes(fw) && item.meta && typeof item.meta.maxContribution==="number"){
          if(st.status==="Not Applicable"){naCount++;continue;}
          const mc=item.meta.maxContribution;
          wTotal+=mc;wAch+=(score/5)*mc;
          const ck=item.meta.category||"";
          if(!catAgg[ck])catAgg[ck]={name:item.meta.categoryName||ck,total:0,ach:0};
          catAgg[ck].total+=mc;catAgg[ck].ach+=(score/5)*mc;
        }
      }

      const posture=(SERVICE_FWS.includes(fw)&&wTotal>0)?Math.round((wAch/wTotal)*1000)/10:null;
      const byCategory=(SERVICE_FWS.includes(fw))?Object.keys(catAgg).sort().map(k=>({key:k,name:catAgg[k].name,total:catAgg[k].total,ach:catAgg[k].ach,pct:catAgg[k].total?Math.round((catAgg[k].ach/catAgg[k].total)*1000)/10:0})):[];

      r[fw]={total,byStatus,byPriority,totalSteps,doneSteps,
        compliance:total?Math.round(((byStatus["Compliant"]||0)/total)*100):0,
        posture,naCount,byCategory,
        stepProgress:totalSteps?Math.round((doneSteps/totalSteps)*100):0,
        avgMaturity:total?(maturitySum/total).toFixed(1):"0.0"};
    }
    return r;
  },[userState]);


  const globalStats=useMemo(()=>{
    if(!stats||!Object.keys(stats).length)return{total:0,compliant:0,pct:0,steps:0,stepsDone:0,stepPct:0,avgMat:0};
    let total=0,compliant=0,steps=0,stepsDone=0,matSum=0;
    for(const fw of FRAMEWORKS){if(!stats[fw])continue;total+=stats[fw].total;compliant+=(stats[fw].byStatus["Compliant"]||0);steps+=stats[fw].totalSteps;stepsDone+=stats[fw].doneSteps;matSum+=parseFloat(stats[fw].avgMaturity||0)}
    return{total,compliant,pct:total?Math.round((compliant/total)*100):0,steps,stepsDone,stepPct:steps?Math.round((stepsDone/steps)*100):0,avgMat:(matSum/FRAMEWORKS.length).toFixed(1)};
  },[stats]);

  const sections=useMemo(()=>{const s=new Set();RAW[activeFw]?.forEach(i=>s.add(i.sec));return["All",...Array.from(s)]},[activeFw]);

  const filteredItems=useMemo(()=>{
    if(!userState)return[];
    return RAW[activeFw].filter(item=>{
      const st=userState[activeFw]?.[item.i];if(!st)return false;
      if(filterStatus!=="All"&&st.status!==filterStatus)return false;
      if(filterPriority!=="All"&&st.priority!==filterPriority)return false;
      if(filterSection!=="All"&&item.sec!==filterSection)return false;
      if(searchQ){const q=searchQ.toLowerCase();return item.t.toLowerCase().includes(q)||item.i.toLowerCase().includes(q)||item.d.toLowerCase().includes(q)}
      return true;
    });
  },[userState,activeFw,filterStatus,filterPriority,filterSection,searchQ]);

  const isServiceActive=SERVICE_FWS.includes(activeFw);

  const serviceBacklog=useMemo(()=>{
    if(!userState||!isServiceActive)return[];
    return RAW[activeFw].map(item=>{
      const st=userState[activeFw]?.[item.i];if(!st)return null;
      if(st.status==="Not Applicable")return null;
      const score=Math.max(0,Math.min(5,parseInt(st.maturity)||0));
      const mc=item.meta?.maxContribution||0;
      const remaining=mc?(1-(score/5))*mc:0;
      return{
        id:item.i,title:item.t,
        category:item.meta?.category||"",categoryName:item.meta?.categoryName||"",
        score,mc,remaining,
        sev:item.meta?.severity||0,wt:item.meta?.weight||0,
        status:st.status,priority:st.priority,owner:st.owner||"",targetDate:st.targetDate||""
      };
    }).filter(Boolean).sort((a,b)=>(b.remaining-a.remaining)||(b.sev-a.sev)||(b.wt-a.wt));
  },[userState,activeFw,isServiceActive]);

  const serviceTotals=useMemo(()=>{
    if(!userState||!isServiceActive)return{applicable:0,na:0,needs:0};
    let applicable=0,na=0,needs=0;
    for(const item of RAW[activeFw]){
      const st=userState[activeFw]?.[item.i];if(!st)continue;
      if(st.status==="Not Applicable"){na++;continue;}
      applicable++;
      const score=Math.max(0,Math.min(5,parseInt(st.maturity)||0));
      if(score<=2)needs++;
    }
    return{applicable,na,needs};
  },[userState,activeFw,isServiceActive]);


  const overdueItems=useMemo(()=>{
    if(!userState)return[];
    const items=[];
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];
      if(st&&st.targetDate&&st.status!=="Compliant"&&new Date(st.targetDate)<new Date(today()))
        items.push({fw,item,st,days:daysBetween(st.targetDate,today())});
    }
    return items.sort((a,b)=>b.days-a.days);
  },[userState]);

  const gapAnalysis=useMemo(()=>{
    if(!userState)return[];
    const gaps=[];
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];if(!st)continue;
      const noAnswers=st.assessmentAnswers.filter(a=>a===false);
      if(noAnswers.length>0||st.status==="Non-Compliant")
        gaps.push({fw,item,st,noCount:noAnswers.length,totalQ:item.q.length,
          failedQs:item.q.filter((q,i)=>st.assessmentAnswers[i]===false)});
    }
    return gaps.sort((a,b)=>{const pO={"Critical":0,"High":1,"Medium":2,"Low":3};return(pO[a.st.priority]||3)-(pO[b.st.priority]||3)});
  },[userState]);

  const ownerWorkload=useMemo(()=>{
    if(!userState)return{};
    const owners={};
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];if(!st||!st.owner)continue;
      if(!owners[st.owner])owners[st.owner]={total:0,compliant:0,overdue:0};
      owners[st.owner].total++;
      if(st.status==="Compliant")owners[st.owner].compliant++;
      if(st.targetDate&&st.status!=="Compliant"&&new Date(st.targetDate)<new Date(today()))owners[st.owner].overdue++;
    }
    return owners;
  },[userState]);

  useEffect(()=>{
    if(!globalSearch||!userState){setGlobalResults([]);return}
    const q=globalSearch.toLowerCase(),results=[];
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      if(item.t.toLowerCase().includes(q)||item.i.toLowerCase().includes(q)||item.d.toLowerCase().includes(q))
        results.push({fw,item,st:userState[fw]?.[item.i]});
    }
    setGlobalResults(results.slice(0,20));
  },[globalSearch,userState]);

  const roadmap=useMemo(()=>{
    if(!userState)return[];
    const items=[];
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){
      const st=userState[fw]?.[item.i];
      if(st&&st.status!=="Compliant"){
        const pO={"Critical":0,"High":1,"Medium":2,"Low":3};
        items.push({fw,item,st,pVal:pO[st.priority]||3});
      }
    }
    items.sort((a,b)=>a.pVal-b.pVal);
    const sprints=[];
    const perSprint=Math.ceil(items.length/6);
    for(let i=0;i<6;i++){
      const chunk=items.slice(i*perSprint,(i+1)*perSprint);
      if(chunk.length)sprints.push({label:`Sprint ${i+1} (Days ${i*15+1}–${(i+1)*15})`,items:chunk});
    }
    return sprints;
  },[userState]);

  // ─── HANDLERS ────────────────────────────────────────────────────────────
  const handleExport=()=>{
    const rows=[["Framework","ID","Title","Status","Priority","Maturity","Owner","Target Date","Steps Done","Total Steps","Notes"]];
    for(const fw of FRAMEWORKS)for(const item of RAW[fw]){const st=userState[fw][item.i];rows.push([fw,item.i,item.t,st.status,st.priority,st.maturity,st.owner,st.targetDate,(st.stepsDone||[]).filter(Boolean).length,item.s.length,st.notes])}
    const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`Compliance_Report_${today()}.csv`;a.click();URL.revokeObjectURL(url);
  };

  const handlePDF=()=>{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    const co=branding.company||"PROW";
    doc.setFontSize(18);doc.setTextColor(68,73,76);doc.text(co+" — Compliance Report",14,20);
    doc.setFontSize(10);doc.setTextColor(100);doc.text(`Generated: ${fmtDate(today())}${branding.project?" | Project: "+branding.project:""}`,14,28);
    doc.setDrawColor(0,131,75);doc.setLineWidth(1);doc.line(14,32,196,32);
    let y=40;
    for(const fw of FRAMEWORKS){
      if(y>260){doc.addPage();y=20}
      const s=stats[fw];
      doc.setFontSize(13);doc.setTextColor(68,73,76);doc.text(fw,14,y);y+=6;
      doc.setFontSize(9);doc.setTextColor(80);
      doc.text(`Compliance: ${s.compliance}% | Steps: ${s.stepProgress}% | Maturity: ${s.avgMaturity}/5`,14,y);y+=8;
      for(const item of RAW[fw]){
        if(y>270){doc.addPage();y=20}
        const st=userState[fw][item.i];
        doc.setFontSize(8);doc.setTextColor(68,73,76);
        doc.text(`${item.i} — ${item.t}`,18,y);
        doc.setTextColor(100);doc.text(`[${st.status}] [${st.priority}] [${st.maturity}]`,120,y);
        y+=5;
      }
      y+=6;
    }
    doc.save(`${co.replace(/\s+/g,'_')}_Compliance_${today()}.pdf`);
  };

  const handleSnapshot=()=>{
    const snap={date:nowISO(),label:`Snapshot — ${fmtDate(today())}`,data:JSON.parse(JSON.stringify(userState))};
    setSnapshots(prev=>[snap,...prev].slice(0,10));
    alert("Snapshot saved!");
  };

  const handleReset=()=>{if(confirm("Reset ALL progress? This cannot be undone.")){setUserState(getInitState());}};

  // ─── AUDIT TRAIL HELPERS ─────────────────────────────────────────────────
  const addAudit=useCallback((action,detail={})=>{
    if(!activeWsId)return;
    const u=meta?.users?.find(u=>u.id===session?.userId);
    const entry={user:u?.name||"System",role,action,...detail};
    appendAudit(activeWsId,entry);
    setAuditLog(prev=>[{id:uid(),ts:nowISO(),user:u?.name||"System",role,action,...detail},...prev].slice(0,500));
  },[activeWsId,meta,session,role]);

  const pushNotification=useCallback((type,message,link="")=>{
    if(!activeWsId)return;
    const notif={id:uid(),ts:nowISO(),type,message,link,read:false};
    setNotifications(prev=>{const n=[notif,...prev].slice(0,100);saveNotifications(activeWsId,n);return n;});
  },[activeWsId]);

  const unreadCount=notifications.filter(n=>!n.read).length;
  const markAllRead=()=>setNotifications(prev=>prev.map(n=>({...n,read:true})));

  // ─── EVIDENCE FILE MANAGEMENT ─────────────────────────────────────────────
  const getEvidFile=(fw,id,idx)=>evidenceFiles[`${fw}::${id}::${idx}`]||null;
  const submitEvidence=(fw,id,idx,fileName)=>{
    const key=`${fw}::${id}::${idx}`;
    const rec={name:fileName,status:"Submitted",submittedAt:nowISO(),submittedBy:meta?.users?.find(u=>u.id===session?.userId)?.name||"User",reviewedAt:null,reviewedBy:null,comment:""};
    setEvidenceFiles(prev=>({...prev,[key]:rec}));
    addAudit("Evidence Submitted",{fw,control:id,file:fileName});
    pushNotification("evidence",`Evidence submitted for ${id}: ${fileName}`);
  };
  const reviewEvidence=(fw,id,idx,status,comment="")=>{
    const key=`${fw}::${id}::${idx}`;
    const rec={...evidenceFiles[key],status,reviewedAt:nowISO(),reviewedBy:meta?.users?.find(u=>u.id===session?.userId)?.name||"Reviewer",comment};
    setEvidenceFiles(prev=>({...prev,[key]:rec}));
    addAudit(`Evidence ${status}`,{fw,control:id,comment});
    pushNotification("approval",`Evidence ${status.toLowerCase()} for control ${id}`);
    if(status==="Accepted"){
      const evArr=(evidenceState[`${fw}::${id}`]||[]);
      evArr[idx]=true;
      setEvidenceState(prev=>({...prev,[`${fw}::${id}`]:[...evArr]}));
    }
  };

  // ─── DEMO MODE HANDLERS ──────────────────────────────────────────────────
  // FIX: completely rewrote loadSampleData — no stale references, reliable flow
  const enterDemoMode=()=>{
    if(ROLE_ORDER[role]<ROLE_ORDER["Compliance Manager"])return;
    const m=loadMeta();
    const sample=buildSampleWorkspaceData(DEMO_WS_ID);

    saveWorkspace(DEMO_WS_ID,sample);

    if(!m.workspaces.some(w=>w.id===DEMO_WS_ID)){
      m.workspaces.push({id:DEMO_WS_ID,name:"Demo — ACME Manufacturing",createdAt:nowISO()});
    }
    // Seed demo users (Owners view) + demo policies (Policies view)
    const demoUsersSeed=[
      {name:"Global Admin",email:"global.admin@acme.demo",role:"Admin"},
      {name:"Compliance Manager",email:"compliance@acme.demo",role:"Compliance Manager"},
      {name:"Information Security Officer",email:"iso@acme.demo",role:"Compliance Manager"},
      {name:"IT Administrator",email:"it.admin@acme.demo",role:"Control Owner"},
      {name:"Infrastructure Lead",email:"infra.lead@acme.demo",role:"Control Owner"},
      {name:"SOC Lead",email:"soc.lead@acme.demo",role:"Control Owner"},
      {name:"Security Engineer",email:"sec.eng@acme.demo",role:"Control Owner"},
      {name:"GRC Analyst",email:"grc@acme.demo",role:"Control Owner"},
      {name:"Helpdesk Manager",email:"helpdesk@acme.demo",role:"Viewer"},
      {name:"Network Engineer",email:"net.eng@acme.demo",role:"Control Owner"},
      {name:"CISO",email:"ciso@acme.demo",role:"Auditor"},
      {name:"AD Engineer",email:"ad.engineer@acme.demo",role:"Control Owner"},
    ];
    const demoUserIds=[];
    if(!m.users)m.users=[];
    if(!m.memberships)m.memberships={};
    for(const du of demoUsersSeed){
      if(m.users.some(u=>String(u.email||"").toLowerCase()===du.email.toLowerCase())) continue;
      const id=uid();
      m.users.push({id,name:du.name,email:du.email,passwordHash:"",createdAt:nowISO(),demo:true});

                    <span style={{marginLeft:6,color:'var(--text-secondary)'}}>{r.item.t}</span>
                    <span style={{marginLeft:6,fontSize:9,color:'var(--text-muted)'}}>({r.fw})</span>

            </button>

          <button type="button" onClick={startTour} style={{...tabBtn(false),background:'var(--bg-input)',border:'1px solid var(--border)',fontWeight:700,fontSize:10,gap:6}} title="Interactive walkthrough">

      {/* ── BRANDING PANEL ───────────────────────────────────────────────── */}

            <input style={{...inp,maxWidth:250}} placeholder="Logo URL (https://...)" value={branding.logo} onChange={e=>setBranding({...branding,logo:e.target.value})}/>

          </div>

            </div>
          </div>
        </div>

            <button type="button" onClick={()=>setShowGuide(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)'}}>{IC.x}</button>

              </button>

              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

          </div>
        </div>

      {/* ── INTERACTIVE WIZARD (TOUR) ─────────────────────────────── */}
      {showTour&&(

          <div className="card" style={{maxWidth:620,width:'100%',padding:22,maxHeight:'calc(100vh - 56px)',overflow:'auto'}} onClick={e=>e.stopPropagation()}>

              </div>
            </div>
          </div>
        </div>

        {perms.updateControls&&<button type="button" onClick={()=>setShowWizard(true)} style={{...tabBtn(false),background:'var(--brand-yellow)',color:'var(--brand-charcoal)',fontWeight:700,fontSize:10}}>{IC.play} Quick-Start</button>}
        {!isDemoMode&&ROLE_ORDER[role]>=ROLE_ORDER["Compliance Manager"]&&(
          <button type="button" onClick={enterDemoMode} style={{...tabBtn(false),background:'var(--bg-accent)',border:'1px solid var(--border-accent)',color:'var(--brand-yellow-dark)',fontWeight:700,fontSize:10,gap:4}}>
            {IC.demo} Load Sample Data
          </button>

        {isDemoMode&&(
          <button type="button" onClick={exitDemoMode} style={{...tabBtn(false),background:'#f59e0b30',border:'1px solid #f59e0b60',color:'#92400e',fontWeight:700,fontSize:10,gap:4}}>

            {FRAMEWORKS.map(fw=>(
              <button type="button" key={fw} style={navBtn((view==='dashboard')?(dashFocusFw===fw):(activeFw===fw))} onClick={()=>{setActiveFw(fw);setExpandedItem(null);setFilterSection("All"); if(view==='dashboard') setDashFocusFw(fw);}}>
                {fw}{stats[fw]&&<span style={{marginLeft:6,opacity:.6,fontSize:10}}>{SERVICE_FWS.includes(fw)?(Math.round((stats[fw].posture||0))+"%"):(stats[fw].compliance+"%")}</span>}

        </div>

          <div className="fade-in">

                <div><strong>Demo — Identity & AD Security Programme 2026</strong><br/>This demo workspace shows five services: AD/GPO Best Practices, AD/GPO Security Baseline, AD/GPO Authentication, AD/GPO Privilege, and AD/GPO Assessment. Some controls are compliant, others are in progress, and some have gaps to close.</div>
              </div>
            )}

                </thead>
                <tbody>

                      <td style={{padding:'8px',fontWeight:600,color:PC[p],borderBottom:'1px solid var(--border-light)'}}>{p}</td>

                        const count=RAW[activeFw].filter(item=>{const st=userState[activeFw][item.i];return st?.priority===p&&st?.status===s}).length;
                        const maxCount=RAW[activeFw].length/4;
                        const intensity=count/Math.max(maxCount,1);
                        const isRisk=(p==="Critical"||p==="High")&&(s==="Not Started"||s==="Non-Compliant");
                        return(
                          <td key={s} style={{padding:'8px',textAlign:'center',borderBottom:'1px solid var(--border-light)',background:count?isRisk?`rgba(239,68,68,${Math.min(intensity*2,.4)})`:s==="Compliant"?`rgba(22,163,74,${Math.min(intensity*2,.3)})`:`rgba(245,210,72,${Math.min(intensity*2,.3)})`:'transparent',fontWeight:count?700:400,color:count?'var(--text-primary)':'var(--text-muted)',borderRadius:4}}>

                  ))}
                </tbody>
              </table>
            </div>
          </div>

        {/* ─── TIMELINE ───────────────────────────────────────────────────── */}
        {view==="timeline"&&(
          <div className="fade-in">
            <h3 style={{fontSize:13,fontWeight:700,margin:'0 0 12px'}}>Timeline — {activeFw} Target Dates</h3>
            <div className="card" style={{padding:16}}>
              {RAW[activeFw].filter(item=>userState[activeFw][item.i]?.targetDate).sort((a,b)=>new Date(userState[activeFw][a.i].targetDate)-new Date(userState[activeFw][b.i].targetDate)).map(item=>{
                const st=userState[activeFw][item.i];

                return(
                  <div key={item.i} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid var(--border-light)'}}>

                    <span style={{width:8,height:8,borderRadius:'50%',background:SC[st.status],flexShrink:0}}/>

                    <span style={{fontSize:11,flex:1}}>{item.t}</span>
                    <span style={badge(SC[st.status])}>{st.status}</span>

        {view==="gaps"&&(

                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>

                    <span style={badge(SC[g.st.status])}>{g.st.status}</span>
                    <span style={{fontSize:10,color:'var(--text-muted)'}}>{g.fw}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
                    <span style={{color:'var(--brand-yellow-dark)',fontFamily:'monospace'}}>{g.item.i}</span> — {g.item.t}

                  {g.failedQs.length>0&&(
                    <div style={{marginTop:6}}>

                {/* ─── OWNERS ─────────────────────────────────────────────────────── */}
        {view==="owners"&&(()=>{
          const wsId=activeWsId||(meta.workspaces?.[0]?.id)||"";
          const permLabels=[
            ["updateControls","Update controls"],
            ["canUploadEvidence","Upload evidence"],
            ["submitForReview","Submit for review"],
            ["canApproveControls","Approve controls"],
            ["managePolicies","Manage policies"],
            ["auditAccess","Audit access"],
            ["manageUsers","Manage users"],
          ];
          const chip=(on)=>({padding:'3px 10px',borderRadius:99,fontSize:10,fontWeight:700,background:on?'var(--bg-accent)':'var(--bg-secondary)',border:`1px solid ${on?'var(--border-accent)':'var(--border)'}`,color:on?'var(--text-primary)':'var(--text-muted)'});

          const users=(meta.users||[]).map(u=>{
            const r=(meta.memberships?.[u.id]?.[wsId])||"Viewer";
            const ov=(meta.permOverrides?.[u.id]?.[wsId])||{};
            const eff={...(ROLE_PERMS[r]||ROLE_PERMS.Viewer),...(ov||{})};
            return {...u,roleWs:r,overrides:ov,effPerms:eff};
          }).sort((a,b)=>a.name.localeCompare(b.name));

          const openCreate=()=>{
            setUserModalMode("create");
            setUserForm({id:"",name:"",username:"",password:"",role:"Control Owner",overrides:{}});
            setShowUserModal(true);
          };
          const openEdit=(u)=>{
            setUserModalMode("edit");
            setUserForm({id:u.id,name:u.name||"",username:u.email||"",password:"",role:u.roleWs||"Viewer",overrides:u.overrides||{}});
            setShowUserModal(true);
          };

          const saveUser=async ()=>{
            const name=(userForm.name||"").trim();
            const username=(userForm.username||"").trim().toLowerCase();
            if(!wsId){alert("No workspace found.");return;}
            if(!name||!username){alert("Name and Username are required.");return;}

            const m=loadMeta();
            if(!m.users)m.users=[];
            if(!m.memberships)m.memberships={};
            if(!m.permOverrides)m.permOverrides={};

            const usersList=[...m.users];
            const existsUsername=(id)=>usersList.some(x=>(x.email||"").toLowerCase()===username && x.id!==id);

            if(userModalMode==="create"){
              if(!userForm.password){alert("Password is required.");return;}
              if(existsUsername("")){alert("Username already exists.");return;}
              const id=uid();
              const ph=await sha256Base64(userForm.password||"");
              usersList.push({id,name,email:username,passwordHash:ph,createdAt:nowISO()});
              m.users=usersList;
              m.memberships[id]={...(m.memberships[id]||{}),[wsId]:(userForm.role||"Viewer")};
              const ov=userForm.overrides||{};
              if(Object.keys(ov).length){
                m.permOverrides[id]={...(m.permOverrides[id]||{}),[wsId]:ov};
              }else{
                if(m.permOverrides[id]){delete m.permOverrides[id][wsId];}
              }
            }else{
              const idx=m.users.findIndex(x=>x.id===userForm.id);
              if(idx<0){alert("User not found.");return;}
              if(existsUsername(userForm.id)){alert("Username already exists.");return;}
              const u=m.users[idx];
              let ph=u.passwordHash;
              if(userForm.password) ph=await sha256Base64(userForm.password||"");
              m.users[idx]={...u,name,email:username,passwordHash:ph};
              m.memberships[u.id]={...(m.memberships[u.id]||{}),[wsId]:(userForm.role||"Viewer")};
              const ov=userForm.overrides||{};
              if(Object.keys(ov).length){
                m.permOverrides[u.id]={...(m.permOverrides[u.id]||{}),[wsId]:ov};
              }else if(m.permOverrides?.[u.id]){
                m.permOverrides[u.id]={...(m.permOverrides[u.id]||{})};

              <div className="card" style={{padding:14,marginBottom:14,overflowX:'auto'}}>
                <div style={{fontWeight:800,fontSize:12,marginBottom:8}}>User Directory</div>

                    <thead>
                      <tr style={{textAlign:'left',fontSize:10,color:'var(--text-muted)'}}>

                        <th style={{padding:'8px 6px',borderBottom:'1px solid var(--border)'}}>Username</th>
                        <th style={{padding:'8px 6px',borderBottom:'1px solid var(--border)'}}>Role</th>
                        <th style={{padding:'8px 6px',borderBottom:'1px solid var(--border)'}}>Permissions</th>
                        <th style={{padding:'8px 6px',borderBottom:'1px solid var(--border)'}}>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {users.map(u=>(
                        <tr key={u.id} style={{fontSize:11}}>
                          <td style={{padding:'10px 6px',borderBottom:'1px solid var(--border-light)'}}>
                            <div style={{display:'flex',alignItems:'center',gap:10}}>
                              <div style={{width:32,height:32,borderRadius:'50%',background:'var(--brand-yellow)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--brand-charcoal)',fontWeight:900,fontSize:12}}>{(u.name||'?').charAt(0).toUpperCase()}</div>
                              <div>
                                <div style={{fontWeight:800}}>{u.name}</div>
                                <div style={{fontSize:10,color:'var(--text-muted)'}}>ID: {u.id}</div>
                              </div>
                            </div>
                          </td>
                          <td style={{padding:'10px 6px',borderBottom:'1px solid var(--border-light)',color:'var(--text-secondary)'}}>{u.email}</td>
                          <td style={{padding:'10px 6px',borderBottom:'1px solid var(--border-light)'}}><span style={badge(PC.Medium)}>{u.roleWs}</span></td>
                          <td style={{padding:'10px 6px',borderBottom:'1px solid var(--border-light)'}}>
                            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                              {permLabels.filter(([k])=>u.effPerms[k]).slice(0,4).map(([k,l])=>(
                                <span key={k} style={{padding:'3px 8px',borderRadius:99,fontSize:10,fontWeight:700,background:'var(--bg-accent)',border:'1px solid var(--border-accent)'}}>{l}</span>
                              ))}
                              {permLabels.filter(([k])=>u.effPerms[k]).length>4&&(
                                <span style={{padding:'3px 8px',borderRadius:99,fontSize:10,fontWeight:700,background:'var(--bg-secondary)',border:'1px solid var(--border)'}}>+{permLabels.filter(([k])=>u.effPerms[k]).length-4}</span>
                              )}
                            </div>
                          </td>
                          <td style={{padding:'10px 6px',borderBottom:'1px solid var(--border-light)'}}>
                            {perms.manageUsers?(
                              <button type="button" onClick={()=>openEdit(u)} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',fontSize:11,fontWeight:800,cursor:'pointer'}}>{IC.edit} Edit</button>
                            ):<span style={{color:'var(--text-muted)'}}>—</span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>

              <h3 style={{fontSize:13,fontWeight:800,margin:'8px 0 12px'}}>Owner Workload</h3>
              {Object.keys(ownerWorkload).length===0?<div className="card" style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}>No owners assigned yet. Use Quick-Start or assign owners in the Checklist.</div>:(

                  <div key={owner} className="card" style={{padding:14,marginBottom:10}}>

                        <div style={{width:32,height:32,borderRadius:'50%',background:'var(--brand-yellow)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--brand-charcoal)',fontWeight:700,fontSize:12}}>{owner.charAt(0).toUpperCase()}</div>
                        <div><div style={{fontWeight:700,fontSize:12}}>{owner}</div><div style={{fontSize:10,color:'var(--text-muted)'}}>{data.total} controls assigned</div></div>
                      </div>
                      <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <span style={badge('#16a34a')}>{data.compliant} compliant</span>

                    <PBar pct={data.total?Math.round((data.compliant/data.total)*100):0} color="#16a34a" h={4}/>

                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                      <div style={{fontWeight:900,fontSize:14}}>{userModalMode==="create"?"Create User":"Edit User"}</div>
                      <button type="button" onClick={()=>setShowUserModal(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:18,lineHeight:1}}>{IC.x}</button>
                    </div>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                      <div>
                        <span className="label">Display Name</span>
                        <input style={inp} value={userForm.name} onChange={e=>setUserForm({...userForm,name:e.target.value})} placeholder="e.g., Global Admin"/>
                      </div>
                      <div>
                        <span className="label">Username</span>
                        <input style={inp} value={userForm.username} onChange={e=>setUserForm({...userForm,username:e.target.value})} placeholder="e.g., globaladmin"/>

                        <span className="label">Password {userModalMode==="edit"&&<span style={{color:'var(--text-muted)'}}>(leave blank to keep)</span>}</span>
                        <input type="password" style={inp} value={userForm.password} onChange={e=>setUserForm({...userForm,password:e.target.value})} placeholder={userModalMode==="create"?"Set a password":"••••••••"}/>
                      </div>
                      <div>
                        <span className="label">Role</span>
                        <select style={sel} value={userForm.role} onChange={e=>setUserForm({...userForm,role:e.target.value})}>

                      </div>
                    </div>

                    <div style={{marginTop:14}}>
                      <div style={{fontWeight:900,fontSize:12,marginBottom:6}}>Permission Overrides (optional)</div>
                      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Overrides apply only to this workspace. Toggle only what you want to force on/off.</div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:8}}>
                        {permLabels.map(([k,l])=>{
                          const cur=userForm.overrides?.[k];
                          const on=cur===true;
                          const off=cur===false;
                          return(
                            <div key={k} className="card" style={{padding:10,borderStyle:'dashed'}}>
                              <div style={{fontWeight:900,fontSize:11,marginBottom:8}}>{l}</div>

                                <button type="button" onClick={()=>setUserForm({...userForm,overrides:{...(userForm.overrides||{}),[k]:true}})} style={{flex:1,background:on?'var(--brand-yellow)':'var(--bg-input)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',fontSize:11,fontWeight:900,cursor:'pointer'}}>Allow</button>
                                <button type="button" onClick={()=>setUserForm({...userForm,overrides:{...(userForm.overrides||{}),[k]:false}})} style={{flex:1,background:off?'#ef4444':'var(--bg-input)',color:off?'white':'var(--text-primary)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',fontSize:11,fontWeight:900,cursor:'pointer'}}>Deny</button>
                                <button type="button" onClick={()=>{const ov={...(userForm.overrides||{})};delete ov[k];setUserForm({...userForm,overrides:ov});}} style={{background:'none',border:'1px solid var(--border)',borderRadius:8,padding:'6px 8px',fontSize:11,fontWeight:900,cursor:'pointer'}}>Reset</button>
                              </div>
                            </div>
                          );

                      </div>
                    </div>

                    <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:16}}>
                      <button type="button" onClick={()=>setShowUserModal(false)} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',fontSize:11,fontWeight:900,cursor:'pointer'}}>Cancel</button>
                      <button type="button" onClick={saveUser} style={{background:'var(--brand-yellow)',color:'var(--brand-charcoal)',border:'none',borderRadius:10,padding:'8px 12px',fontSize:11,fontWeight:900,cursor:'pointer'}}>{IC.check} Save</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })()}

{/* ─── ROADMAP ────────────────────────────────────────────────────── */}
        {view==="roadmap"&&(
          <div className="fade-in">
            <h3 style={{fontSize:13,fontWeight:700,margin:'0 0 4px'}}>90-Day Implementation Roadmap</h3>
            <p style={{fontSize:11,color:'var(--text-secondary)',margin:'0 0 16px'}}>Auto-generated 6-sprint plan based on priority. Critical/High items first.</p>
            {roadmap.map((sprint,i)=>(
              <div key={i} className="card" style={{padding:14,marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700}}>{sprint.label}</span>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>{sprint.items.length} controls</span>
                </div>

                  <div key={j} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',fontSize:11,borderBottom:'1px solid var(--border-light)'}}>
